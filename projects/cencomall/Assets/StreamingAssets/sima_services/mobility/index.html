<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cenco Costanera</title>
<!-- mobility-ui-v26-market-search -->
<link rel="stylesheet" href="../shared/app.css" />
<link rel="stylesheet" href="../shared/mapvx/styles.css" />
<script src="../shared/locale.js"></script>
<script src="../shared/native-payload.js"></script>
<script src="../shared/market-query-i18n.js"></script>
<script src="../shared/market-i18n.js"></script>
<script src="../shared/bridge.js"></script>
<script src="../shared/market-search.js"></script>
<script src="../shared/services-catalog.js"></script>
<script src="../shared/mapvx/index.js"></script>
<script src="../shared/mapvx-bridge.js"></script>
<style>
:root {
  --cm-purple: #280071;
  --cm-purple-dark: #1E1630;
  --cm-blue: #00B1FF;
  --cm-blue-dark: #008FD0;
  --cm-pink: #FF7E3E;
  --cm-surface: #FFFFFF;
  --cm-card: #FFFFFF;
  --cm-text: #1E1630;
  --cm-muted: #3F3468;
  --cm-line: #ECE8F2;
  --cm-shadow: 0 6px 16px rgba(40, 0, 113, 0.08);
  --cm-speak-bar: 132px;
  --cm-header-height: 54px;
  --cm-survey-strip-height: 0px;
}

.app-shell.has-survey { --cm-survey-strip-height: 76px; }

html, body {
  background: transparent;
  scroll-padding-bottom: calc(var(--cm-speak-bar) + env(safe-area-inset-bottom, 0px));
}
body.cencomall-theme::before { display: none; }
body.cencomall-theme { color: var(--cm-text); margin: 0; }

.cencomall-theme .app-shell {
  max-width: 1080px;
  padding: 0 0 calc(var(--cm-speak-bar) + env(safe-area-inset-bottom, 0px));
  gap: 0;
  background: transparent;
  min-height: 100%;
}

.cm-header {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--cm-purple);
  color: #fff;
  margin: 14px 14px 0;
  border-radius: 18px 18px 0 0;
  padding: 14px 18px 16px;
  box-shadow: var(--cm-shadow);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
}

.cm-header-title {
  margin: 0;
  font-size: 22px;
  font-weight: 800;
  flex: 1;
  min-width: 0;
}

.cm-header-back {
  appearance: none;
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  order: -1;
}

.cm-header-close {
  appearance: none;
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  order: -1;
}

.cm-body {
  margin: 0 14px 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: #fff;
  border: 1px solid var(--cm-line);
  border-top: 0;
  border-radius: 0 0 18px 18px;
}

.cm-panel {
  background: var(--cm-card);
  border-radius: 16px;
  padding: 14px;
  box-shadow: var(--cm-shadow);
  border: 1px solid var(--cm-line);
}

.cm-survey-strip {
  position: sticky;
  top: var(--cm-header-height);
  z-index: 35;
  background: #fff;
  border-bottom: 1px solid var(--cm-line);
  border-left: 1px solid var(--cm-line);
  border-right: 1px solid var(--cm-line);
  box-shadow: 0 4px 14px rgba(61, 29, 92, 0.07);
  margin: 0 14px;
  padding: 8px 10px 8px 12px;
  animation: fadeIn 0.25s ease;
}

.cm-survey-strip.hidden { display: none; }

.cm-survey-strip-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cm-survey-strip-text {
  flex: 1;
  min-width: 0;
}

.cm-survey-title {
  margin: 0 0 2px;
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
}

.cm-star-rating {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

.cm-star-btn {
  width: 36px;
  height: 36px;
  border: 2px solid var(--cm-line);
  border-radius: 9px;
  background: #fff;
  color: #C4B8D4;
  font-size: 18px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
}

.cm-star-btn:hover,
.cm-star-btn:focus-visible {
  border-color: #D4B85A;
  background: #FFF9E8;
}

.cm-star-btn.active,
.cm-star-btn.selected {
  border-color: #E6A800;
  background: #FFF6D6;
  color: #E6A800;
}

.cm-star-btn:active { transform: scale(0.94); }

.cm-star-hint {
  font-size: 10px;
  color: var(--cm-muted);
  margin: 0;
  line-height: 1.2;
}

.cm-survey-dismiss {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: #F0E9F8;
  color: var(--cm-muted);
  font-size: 18px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
}

.cm-survey-dismiss:active { transform: scale(0.94); }

.cm-survey-strip.is-thanks .cm-survey-strip-inner {
  justify-content: center;
  padding: 2px 0;
}

.cm-survey-thanks-msg {
  font-size: 13px;
  font-weight: 700;
  color: var(--cm-purple-dark);
  margin: 0;
  text-align: center;
}

.cm-welcome {
  text-align: center;
  padding: 16px 10px;
  color: var(--cm-muted);
  font-size: 14px;
  line-height: 1.5;
}

.cm-results-sticky {
  background: var(--cm-card);
  margin: -14px -14px 10px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--cm-line);
  border-radius: 16px 16px 0 0;
}

.cm-results-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.cm-results-title { font-size: 17px; font-weight: 800; margin: 0; }

.cm-results-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--cm-purple);
  background: #F0E9F8;
  padding: 4px 8px;
  border-radius: 999px;
}

.cm-results-query {
  font-size: 13px;
  color: var(--cm-muted);
  margin: 0;
}

.result-block { padding-bottom: 8px; }

.store-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  align-items: start;
  gap: 10px;
  padding-bottom: 24px;
}

.store-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid var(--cm-line);
  box-shadow: 0 4px 14px rgba(61, 29, 92, 0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.store-card-top { padding: 10px 10px 8px; flex: 1; }

.store-initials {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, #EFE5FA 0%, #DCC9F2 100%);
  color: var(--cm-purple-dark);
  font-size: 14px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  align-self: center;
}

.store-logo {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: #F6F1FB;
  object-fit: contain;
  margin: 0 auto 8px;
  display: block;
  align-self: center;
}

.store-name {
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.store-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }

.store-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 6px;
  border-radius: 999px;
  background: #F6F1FB;
  color: var(--cm-purple-dark);
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.store-badge-floor { background: #EAF3FF; color: #1455A0; }

.store-detail {
  font-size: 10px;
  color: var(--cm-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-ver-mapa,
.btn-remodelacion {
  width: 100%;
  min-width: 100%;
  display: flex;
  align-self: stretch;
  box-sizing: border-box;
  border: none;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  padding: 14px 12px;
  cursor: pointer;
  border-radius: 0 0 14px 14px;
  min-height: 52px;
  letter-spacing: 0.01em;
  margin: 0;
  position: relative;
  z-index: 1;
  appearance: none;
  -webkit-appearance: none;
}

.btn-ver-mapa {
  background: linear-gradient(135deg, var(--cm-purple) 0%, #7440a8 100%);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  overflow: visible;
}
.btn-remodelacion { background: #B7B0C2; color: #fff; cursor: not-allowed; }

.store-card-group { grid-column: span 1; }
.store-card-group .store-card-top { flex: 0 0 auto; }

.store-badge-locales {
  background: #FFF3E0;
  color: #B45309;
}

.store-floors-summary {
  font-size: 10px;
  color: var(--cm-muted);
  margin-top: 4px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.btn-toggle-locales {
  width: 100%;
  border: none;
  font-size: 11px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
  background: #EFE5FA;
  color: var(--cm-purple-dark);
}

.store-group-locations {
  border-top: 1px solid var(--cm-line);
  background: #FAF7FD;
}

.store-group-locations.hidden { display: none; }

.store-group-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--cm-line);
}

.store-group-row:last-child { border-bottom: none; }
.store-group-row.map-only {
  justify-content: center;
  padding: 8px;
}

.store-group-row-info { flex: 1; min-width: 0; }

.store-group-row-name {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.store-group-row-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.btn-ver-mapa-sm {
  width: 100%;
  min-width: 100%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  font-size: 11px;
  font-weight: 700;
  padding: 11px 12px;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--cm-purple) 0%, #7440a8 100%);
  color: #fff;
  white-space: nowrap;
  flex: 1 1 auto;
  flex-shrink: 1;
  min-height: 42px;
  text-align: center;
}
.store-group-row.map-only .btn-ver-mapa-sm {
  margin: 0 auto;
  padding-left: 8px;
  padding-right: 8px;
}

.cm-empty { text-align: center; padding: 20px 10px; }
.cm-empty-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
.cm-empty-copy { color: var(--cm-muted); font-size: 13px; line-height: 1.4; }
.cm-empty-actions { margin-top: 12px; display: flex; justify-content: center; }
.cm-empty-btn {
  border: 1px solid var(--cm-purple);
  background: #fff;
  color: var(--cm-purple);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}
.cm-empty-btn:active { transform: scale(0.98); }

.cm-speak-fab {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(180deg, rgba(244,240,248,0) 0%, rgba(244,240,248,0.92) 30%, #F4F0F8 100%);
  pointer-events: none;
}

.cm-speak-btn {
  width: 100%;
  border: none;
  border-radius: 18px;
  min-height: 58px;
  padding: 14px 18px;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  pointer-events: auto;
  /* Misma línea visual que el mic de la app RN (#0f2f78) */
  background: #0f2f78;
  box-shadow: 0 8px 20px rgba(15, 47, 120, 0.28);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.cm-speak-btn:active { transform: scale(0.98); }

.cm-speak-btn.is-listening,
.cm-speak-mic-btn.is-listening {
  opacity: 0.92;
  animation: cm-speak-pulse 1.2s ease-in-out infinite;
}

@keyframes cm-speak-pulse {
  0%, 100% { box-shadow: 0 8px 24px rgba(91, 45, 142, 0.3); }
  50% { box-shadow: 0 8px 28px rgba(228, 0, 124, 0.45); }
}

.cm-speak-fab.is-listening .cm-speak-version::after {
  content: " · mic";
  font-weight: 700;
}

.cm-speak-fab-actions {
  display: none;
  gap: 8px;
  pointer-events: auto;
}

.cm-speak-fab.is-typing .cm-speak-btn {
  display: none;
}

.cm-speak-fab.is-typing .cm-speak-fab-actions {
  display: flex;
}

.cm-speak-search-btn {
  flex: 1;
  border: none;
  border-radius: 18px;
  min-height: 58px;
  padding: 14px 18px;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  background: #0f2f78;
  box-shadow: 0 8px 20px rgba(15, 47, 120, 0.28);
}

.cm-speak-mic-btn {
  width: 56px;
  min-width: 56px;
  border: none;
  border-radius: 18px;
  padding: 0;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  background: #0f2f78;
  box-shadow: 0 8px 20px rgba(15, 47, 120, 0.28);
}

.cm-speak-search-btn:active,
.cm-speak-mic-btn:active {
  transform: scale(0.98);
}

.cm-speak-version {
  margin-top: 6px;
  padding-right: 6px;
  font-size: 5px;
  font-weight: 700;
  line-height: 1;
  color: rgba(61, 29, 92, 0.68);
  text-align: right;
  letter-spacing: 0.02em;
  pointer-events: none;
  user-select: none;
}

.map-view {
  position: fixed;
  top: max(14px, env(safe-area-inset-top, 0px));
  left: max(14px, env(safe-area-inset-left, 0px));
  right: max(14px, env(safe-area-inset-right, 0px));
  bottom: max(14px, env(safe-area-inset-bottom, 0px));
  background: var(--cm-surface);
  z-index: 100;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--cm-shadow);
  border: 1px solid var(--cm-line);
}

.map-view.hidden { display: none; }

.map-view.hidden.preload-mount {
  display: flex;
  opacity: 0;
  pointer-events: none;
  z-index: -1;
}

.map-view-header {
  display: flex;
  align-items: center;
  padding: 14px 18px 16px;
  background: var(--cm-purple);
  color: #fff;
  gap: 12px;
  flex-wrap: wrap;
  box-shadow: var(--cm-shadow);
  flex-shrink: 0;
}

.map-view-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.btn-map-route {
  border: none;
  background: var(--cm-pink);
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.btn-map-route.hidden { display: none; }

.btn-map-route:disabled,
.btn-map-route.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(255,255,255,0.25);
}

.map-current-floor {
  position: absolute;
  top: 10px;
  left: 10px;
  right: auto;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  color: var(--cm-purple-dark);
  padding: 6px 16px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  border: 1px solid rgba(61,29,92,0.1);
  pointer-events: none;
  user-select: none;
}

/* MapLibre +/- zoom controls — sit slightly lower so they don't crowd the header */
#map-view .maplibregl-ctrl-top-right {
  top: 58px;
  right: 10px;
}

.map-current-floor.hidden { display: none; }

/* Map header reuses .cm-header-back / .cm-header-close (same pills as search). */
.map-view-header .cm-header-back,
.map-view-header .cm-header-close {
  order: 0;
}

.map-view-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 18px;
  min-width: 0;
}

.map-view-title-text {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.map-view-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
}

.store-detail-panel {
  background: #fff;
  padding: 16px;
  border-bottom: 1px solid var(--cm-line);
}

.store-detail-panel.hidden { display: none; }

.store-detail-header {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.store-detail-head-text {
  flex: 1;
  min-width: 0;
}

.store-detail-photo {
  width: 156px;
  height: 117px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  background: #f0eaf8;
}

.store-detail-logo.store-logo,
.store-detail-logo.store-initials {
  width: 32px;
  height: 32px;
  border-radius: 12px;
  margin-bottom: 0;
  flex-shrink: 0;
}

.store-detail-name {
  margin: 0;
  font-size: 18px;
  font-weight: 800;
  line-height: 1.2;
}

.store-detail-schedule {
  margin-top: 4px;
  font-size: 12px;
  color: var(--cm-muted);
  line-height: 1.3;
}

.store-detail-desc {
  margin: 10px 0 0;
  font-size: 13px;
  color: var(--cm-muted);
  line-height: 1.45;
}

.map-embed-wrap {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  background: #fff;
}

.map-embed-wrap.is-loading #mapvx-container {
  opacity: 0;
  pointer-events: none;
}

.map-embed-wrap.is-loading #map-placeholder {
  z-index: 2;
}

.map-embed-wrap.is-loading .map-loading-circle {
  display: flex;
}

.map-embed-wrap.is-ready #mapvx-container {
  opacity: 1;
}

#map-iframe,
#mapvx-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  background: #fff;
  min-height: 0;
  flex: none;
}

#mapvx-container.hidden,
#map-iframe.hidden { display: none; }

#mapvx-container {
  transition: opacity 160ms ease;
}

.map-status {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--cm-muted);
  background: #fff;
  border-bottom: 1px solid var(--cm-line);
}

.map-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  color: var(--cm-muted);
  font-size: 14px;
  background: #fff;
}

.map-loading-circle {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3;
  pointer-events: none;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(2px);
}

.map-loading-circle-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--cm-purple-dark);
  font-size: 13px;
  font-weight: 700;
}

.map-loading-spinner {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 4px solid rgba(91,45,142,0.14);
  border-top-color: var(--cm-purple);
  animation: spin 0.9s linear infinite;
}

.map-zoom-meter {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 4;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.92);
  color: var(--cm-purple-dark);
  font-size: 11px;
  font-weight: 700;

  if (window.location.protocol === "file:") return true;

function normalizeTotemFloorValue(value) {
  if (typeof ServicesCatalog !== "undefined" && ServicesCatalog.normalizeFloorKey) {
    return ServicesCatalog.normalizeFloorKey(value);
  }
  const raw = String(value == null ? "" : value).trim();
  if (!raw) return "";
  const n = raw.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  if (n === "pb" || n.indexOf("planta baja") >= 0 || n === "0") return "PB";
  const m = n.match(/(?:nivel|piso|floor|level|n)\s*(\d+)/) || n.match(/^(\d+)$/);
  return m ? m[1] : raw.toUpperCase();
}

/** Floor where this totem / avatar stands — used to rank nearby bathrooms. */
function getTotemFloorContext() {
  const cfg = window.MAPVX_CONFIG || {};
  const character = window.MALL_CHARACTER || {};
  const params = new URLSearchParams(window.location.search);
  const candidates = [
    cfg.totemFloor,
    cfg.originFloor,
    cfg.floor,
    window.MALL_TOTEM_FLOOR,
    window.MALL_FLOOR,
    window.MALL_CHARACTER_FLOOR,
    character.floor,
    character.Floor,
    params.get("totemFloor"),
    params.get("floor"),
  ];
  for (let i = 0; i < candidates.length; i++) {
    const normalized = normalizeTotemFloorValue(candidates[i]);
    if (normalized) return normalized;
  }
  return "";
}

function rememberTotemFloor(rawFloor) {
  const floor = normalizeTotemFloorValue(rawFloor);
  if (!floor) return "";
  window.MALL_TOTEM_FLOOR = floor;
  if (!window.MAPVX_CONFIG) window.MAPVX_CONFIG = {};
  if (!window.MAPVX_CONFIG.totemFloor) window.MAPVX_CONFIG.totemFloor = floor;
  window.MALL_CHARACTER = Object.assign({}, window.MALL_CHARACTER || {}, { floor: floor });
  return floor;
}

function formatSpeakTemplate(template, values) {
  let out = String(template || "");
  Object.keys(values || {}).forEach((key) => {
    out = out.split("{" + key + "}").join(String(values[key] != null ? values[key] : ""));
  });
  return out;
}

function isFoodMarketQuery(query) {
  const q = String(query || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
  return /\b(gastronomia|restaurante|restaurantes|almuerzo|cena|desayuno|comida|comer|lunch|dinner|breakfast|food|dining|restaurant)\b/.test(
    q
  );
}

function speakMarketResultsFound(payload) {
  if (typeof SimaBridge === "undefined" || typeof SimaBridge.speak !== "function") return;
  const results = payload.results || [];
  if (!results.length) return;
  const query = payload.query || "";
  const food = payload.resultKind === "restaurants" || isFoodMarketQuery(query);

  if (results.length === 1) {
    const store = results[0];
    const name = store.brand || store.name || query;
    const floor = String(store.floor || "").trim();
    const message = floor
      ? formatSpeakTemplate(t(food ? "restaurantsFoundOneFloor" : "storesFoundOneFloor"), { name, floor })
      : formatSpeakTemplate(t(food ? "restaurantsFoundOne" : "storesFoundOne"), { name });
    SimaBridge.speak(message);
    return;
  }

  SimaBridge.speak(
    formatSpeakTemplate(t(food ? "restaurantsFoundMany" : "storesFoundMany"), {
      count: results.length,
      query,
    })
  );
}

function normalizeMarketQuery(query) {
  return String(query || "").trim().toLowerCase();

function localMarketSearchAlreadyResolved(query, seq) {
  const q = normalizeMarketQuery(query);

    q &&

    (seq == null || lastLocalMarketSearch.seq === seq) &&
    lastMarketPayload &&
    Array.isArray(lastMarketPayload.results) &&
    lastMarketPayload.results.length
  );
}

function normalizeCategoryKey(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function matchesPopularCategoryToken(categoryKey, token) {
  if (!categoryKey || !token) return false;
  return categoryKey === token || categoryKey.indexOf(token + " ") === 0 || categoryKey.indexOf(" " + token) >= 0 || categoryKey.indexOf(token) >= 0;
}

function getPopularCategoryPriorityTokens() {
  return [
    "deportes",
    "sport",
    "moda",
    "fashion",
    "calzado",
    "tecnologia",
    "hogar",
    "gastronomia",
    "belleza",
    "salud",
    "infantil",
  ];
}

function pickPopularCategories(categories, limit) {
  const list = Array.isArray(categories) ? categories.slice() : [];
  const max = Math.max(1, Number(limit) || 6);
  if (!list.length) return [];

  const ordered = list.slice().sort((a, b) => {
    if ((b.storeCount || 0) !== (a.storeCount || 0)) return (b.storeCount || 0) - (a.storeCount || 0);
    return String(a.name || "").localeCompare(String(b.name || ""), "es");
  });

  const selected = [];
  const seen = {};
  const tokens = getPopularCategoryPriorityTokens();

  tokens.forEach((token) => {
    if (selected.length >= max) return;
    const match = ordered.find((cat) => {
      const key = normalizeCategoryKey(cat && (cat.key || cat.name));
      if (!key || seen[key]) return false;
      return matchesPopularCategoryToken(key, token);
    });
    if (!match) return;
    const key = normalizeCategoryKey(match.key || match.name);
    seen[key] = true;
    selected.push(match);
  });

  ordered.forEach((cat) => {
    if (selected.length >= max) return;
    const key = normalizeCategoryKey(cat && (cat.key || cat.name));
    if (!key || seen[key]) return;
    seen[key] = true;
    selected.push(cat);
  });

  return selected.slice(0, max);
}

async function renderPopularCategoriesLanding() {
  const wrap = document.getElementById("popularCategoriesWrap");
  const chips = document.getElementById("popularCategoriesChips");
  if (!wrap || !chips) return;

  if (!shouldUseLocalMarketCatalog()) {
    wrap.style.display = "none";
    return;
  }

  wrap.style.display = "";
  chips.innerHTML = `<span class="cm-popular-category-chip is-loading">${escapeHtml(t("popularCategoriesLoading"))}</span>`;

  if (typeof MarketSearch === "undefined" || !MarketSearch.loadCatalog || !MarketSearch.listCategories) {
    wrap.style.display = "none";
    chips.innerHTML = "";
    return;
  }

  try {
    await MarketSearch.loadCatalog();
    const data = MarketSearch.listCategories();
    const popular = pickPopularCategories(data.categories || [], 6);
    if (!popular.length) {
      wrap.style.display = "none";
      chips.innerHTML = "";
      return;
    }

    chips.innerHTML = popular.map((cat) => {
      const canonicalName = String(cat.name || "");
      const displayName = escapeHtml(localizeCategoryName(canonicalName));
      const jsName = encodeURIComponent(canonicalName);
      return `<button class="cm-popular-category-chip" type="button" onclick="selectStoreCategory(decodeURIComponent('${jsName}'))">${displayName}</button>`;
    }).join("");
  } catch (e) {
    console.warn("renderPopularCategoriesLanding failed", e);
    wrap.style.display = "none";
    chips.innerHTML = "";
  }
}

function buildMarketSearchAttempts(query) {
  if (typeof MarketQueryI18n !== "undefined" && MarketQueryI18n.buildSearchAttempts) {
    return MarketQueryI18n.buildSearchAttempts(query, mobilityLocale);
  }

  const attempts = [];
  const seen = new Set();
  const add = (value) => {
    const text = String(value || "").trim();
    const key = normalizeMarketQuery(text);
    if (!text || seen.has(key)) return;
    seen.add(key);
    attempts.push(text);
  };

  add(query);
  return attempts;
}

async function runMarketCatalogSearch(query, options) {
  options = options || {};
  if (!shouldUseLocalMarketCatalog()) return null;
  const q = String(query || "").trim();
  if (!q) return null;

  if (typeof MarketSearch === "undefined") {
    if (!options.silent) showSearchError(t("loadError"));
    return null;
  }

  try {
    await MarketSearch.loadCatalog();
    if (!MarketSearch.getCatalogSize()) {
      SimaBridge.log("market catalog empty after load");
      if (!options.silent) showSearchError(t("loadError"));
      return null;
    }

    const attempts = buildMarketSearchAttempts(q);
    const searchFn = (options.voice && typeof MarketSearch.searchVoice === "function")
      ? MarketSearch.searchVoice.bind(MarketSearch)
      : MarketSearch.search.bind(MarketSearch);
    const foodQuery = isFoodMarketQuery(q);
    const defaultLimit = foodQuery ? 80 : 30;

    let searchResult = null;
    let usedQuery = q;

    for (let i = 0; i < attempts.length; i++) {
      const attempt = attempts[i];
      const result = searchFn(attempt, { limit: options.limit || defaultLimit });
      searchResult = result;
      if (result.results && result.results.length) {
        usedQuery = attempt;
        if (attempt !== q) {
          SimaBridge.log(
            "market_search retry q=" + q + " -> " + attempt +
            (result.searchMode ? " mode=" + result.searchMode : "")
          );
        }
        break;
      }
    }

    const payload = {
      type: "market_search",
      query: q,
      searchQuery: usedQuery,
      results: (searchResult && searchResult.results) || [],
      totalMatches: (searchResult && searchResult.totalMatches) || 0,
      catalogSize: (searchResult && searchResult.catalogSize) || MarketSearch.getCatalogSize(),
      source: "market-catalog",
      resultType: (searchResult && searchResult.resultType) || "search",
      isFallbackRelated: !!(searchResult && searchResult.isFallbackRelated),
      resultKind: foodQuery ? "restaurants" : "stores",
    };

    if (!options.skipRender) {
      renderMarketResults(payload);
      lastLocalMarketSearch = {
        query: normalizeMarketQuery(q),
        seq: options.seq != null ? options.seq : marketSearchSeq,
      };
    }

    return payload;
  } catch (e) {
    console.error("runMarketCatalogSearch failed", e);
    SimaBridge.log("market catalog search failed: " + (e.message || e));
    if (!options.silent) showSearchError(t("loadError"));
    return null;
  }
}

function prefetchMarketCatalog() {
  if (!shouldUseLocalMarketCatalog()) return;
  if (typeof MarketI18n !== "undefined" && MarketI18n.loadOverlay) {
    MarketI18n.loadOverlay()
      .then(function () {
        if (mobilityLocale !== "es") applyMobilityLocale();
      })
      .catch(function (e) {
        console.warn("market i18n prefetch failed", e);
      });
  }
  if (typeof MarketSearch === "undefined" || !MarketSearch.loadCatalog) return;
  MarketSearch.loadCatalog()
    .then(function () {
      SimaBridge.log("market catalog ready count=" + MarketSearch.getCatalogSize());
    })
    .catch(function (e) {
      console.warn("market catalog prefetch failed", e);
    });
}

function prefetchServicesCatalog() {
  if (typeof ServicesCatalog === "undefined" || !ServicesCatalog.loadCatalog) return;
  ServicesCatalog.loadCatalog()
    .then(function () {
      SimaBridge.log("services catalog ready count=" + ServicesCatalog.getAll().length);
    })
    .catch(function (e) {
      console.warn("services catalog prefetch failed", e);
    });
}

function runServicesCatalogSearch(query, options) {
  options = options || {};
  const q = String(query || "").trim();
  const serviceId = options.serviceId ? String(options.serviceId).trim() : "";
  if ((!q && !serviceId) || typeof ServicesCatalog === "undefined" || !ServicesCatalog.search) {
    return false;
  }

  ensureStoreSearchReady();

  const totemFloor = getTotemFloorContext();
  ServicesCatalog.loadCatalog()
    .then(function () {
      const searchOpts = Object.assign({}, options, {
        serviceId: serviceId || options.serviceId,
        preferFloor: options.preferFloor || options.totemFloor || totemFloor || undefined,
      });
      const results = ServicesCatalog.search(q || serviceId, searchOpts);
      const displayQuery = q || (results[0] && results[0].name) || serviceId;
      SimaBridge.log(
        "services_catalog_search q=" + displayQuery +
        " results=" + results.length +
        " totemFloor=" + (totemFloor || "-") +
        " source=" + (options.source || "local")
      );
      renderServicesResults({
        type: "services_search",
        query: displayQuery,
        results: results,
        source: options.source || "local-catalog",
        mall: "costanera",
        totemFloor: totemFloor || "",
      });
      if (results.length === 1 && results[0].description) {
        SimaBridge.speak(results[0].description);
      } else if (results.length > 1) {
        SimaBridge.speak(t("services") + ": " + results.length + " " + (t("options") || "opciones"));
      } else if (!results.length) {
        SimaBridge.speak(t("servicesNotFound"));
      }
    })
    .catch(function (e) {
      showSearchError(t("loadErrorTitle") + ": " + (e.message || e));
    });
  return true;
}

function enrichServicesSearchPayload(data) {
  if (!data || typeof ServicesCatalog === "undefined" || !ServicesCatalog.getById) return data;
  if (!Array.isArray(data.results)) return data;
  data.results = data.results.map(function (row) {
    const id = row && (row.id || row.catalogId);
    if (!id || !ServicesCatalog.isReady || !ServicesCatalog.isReady()) return row;
    const entry = ServicesCatalog.getById(id);
    if (!entry) return row;
    const card = ServicesCatalog.toResultCard(entry);
    return Object.assign({}, card, row, {
      name: row.name || card.name,
      description: row.description || card.description,
      location: row.location || card.location,
      floors: row.floors && row.floors.length ? row.floors : card.floors,
      anchorLocal: row.anchorLocal || card.anchorLocal,
      anchorBrand: row.anchorBrand || card.anchorBrand,
      routeApproachQuery: row.routeApproachQuery || card.routeApproachQuery,
      routeApproachLocal: row.routeApproachLocal || card.routeApproachLocal,
      routeApproachWeight: row.routeApproachWeight != null ? row.routeApproachWeight : card.routeApproachWeight,
      routeApproachMaxMeters: row.routeApproachMaxMeters != null ? row.routeApproachMaxMeters : card.routeApproachMaxMeters,
      routeApproachPullFrom: row.routeApproachPullFrom || card.routeApproachPullFrom,
      poiRef: row.poiRef || card.poiRef,
      mapvxId: row.mapvxId || card.mapvxId,
      mapvxLat: row.mapvxLat != null ? row.mapvxLat : card.mapvxLat,
      mapvxLng: row.mapvxLng != null ? row.mapvxLng : card.mapvxLng,
      features: row.features || card.features,
    });
  });
  return data;
}

function getInitialServiceId() {
  const params = new URLSearchParams(window.location.search);
  return String(
    window.MALL_SERVICE_ID
    || params.get("service")
    || params.get("serviceId")
    || ""
  ).trim();
}

function getInitialServiceQuery() {
  const params = new URLSearchParams(window.location.search);
  return String(
    window.MALL_SERVICE_QUERY
    || params.get("serviceQuery")
    || params.get("serviceQ")
    || ""
  ).trim();
}

function looksLikeServicesCatalogQuery(query) {
  if (typeof ServicesCatalog === "undefined") return false;
  if (ServicesCatalog.looksLikeServicesQuery) {
    return ServicesCatalog.looksLikeServicesQuery(query);
  }
  return !!(ServicesCatalog.looksLikeBathroomQuery && ServicesCatalog.looksLikeBathroomQuery(query));
}

function routeUnifiedSearch(query, options) {
  options = options || {};
  const q = String(query || "").trim();
  if (!q) return false;

  marketSearchSeq++;
  setStoreSearchInputs(q);

  if (looksLikeServicesCatalogQuery(q)) {
    // Do NOT notify native services_search here: RN/backend returns legacy
    // mall services (cajero, mudadores agregados) and would overwrite the
    // local bathroom catalog results on the totem.
    SimaBridge.log("services_search local-catalog q=" + q);
    return runServicesCatalogSearch(q, Object.assign({ source: options.source || "text" }, options));
  }

  if (shouldNotifyUnityMarketSearch()) {
    SimaBridge.send("market_search", {
      text: q,
      source: options.source || "text",
      locale: mobilityLocale,
    });
  }
  if (shouldUseLocalMarketCatalog()) {
    runMarketCatalogSearch(q, { seq: marketSearchSeq, voice: !!options.voice });
  }
  return true;
}

  try {

      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: "close_webview",
        payload: {},

  } catch (e3) {}
}

async function openStoreCategories() {
  if (!shouldUseLocalMarketCatalog()) return;
  if (typeof MarketSearch === "undefined") {
    showSearchError(t("loadError"));
    return;
  }

  hideWelcome();
  const landing = document.getElementById("store-search-landing");
  if (landing) landing.classList.remove("visible");

  document.getElementById("resultado").innerHTML = `
    <div class="cm-panel fade-in">
      <div class="cm-empty">
        <div class="cm-empty-title">${escapeHtml(t("categories"))}</div>
        <div class="cm-empty-copy">${escapeHtml(t("categoriesLoading"))}</div>
      </div>
    </div>`;

  try {
    await MarketSearch.loadCatalog();
    const data = MarketSearch.listCategories();
    renderStoreCategories(data.categories || []);
  } catch (e) {
    console.error("openStoreCategories failed", e);
    showSearchError(t("loadError"));
  }
}

function renderStoreCategories(categories) {
  hideWelcome();

  if (!categories.length) {
    document.getElementById("resultado").innerHTML = `
      <div class="cm-panel fade-in">
        <div class="cm-empty">
          <div class="cm-empty-title">${escapeHtml(t("categories"))}</div>
          <div class="cm-empty-copy">${escapeHtml(t("categoriesEmpty"))}</div>
        </div>
      </div>`;
    return;
  }

  const chips = categories.map(function (cat) {
    const canonicalName = String(cat.name || "");
    const displayName = escapeHtml(localizeCategoryName(canonicalName));
    const jsName = encodeURIComponent(canonicalName);
    return `
      <button class="cm-category-chip" type="button" onclick="selectStoreCategory(decodeURIComponent('${jsName}'))">
        <span class="cm-category-chip-name">${displayName}</span>
        <span class="cm-category-chip-count">${cat.storeCount} ${escapeHtml(t("storesInCategory"))}</span>
      </button>`;
  }).join("");

  document.getElementById("resultado").innerHTML = `
    <div class="cm-panel fade-in">
      <div class="cm-results-sticky">
        <button class="cm-back-link" type="button" onclick="returnToStoreSearchLanding()">${escapeHtml(t("backSearch"))}</button>
        <div class="cm-results-head">
          <h2 class="cm-results-title">${escapeHtml(t("categories"))}</h2>
          <span class="cm-results-count">${categories.length}</span>
        </div>
        <p class="cm-results-query">${escapeHtml(t("categoriesHint"))}</p>
      </div>
      <div class="cm-category-grid">${chips}</div>
    </div>`;
}

async function selectStoreCategory(categoryName) {
  if (!shouldUseLocalMarketCatalog()) return;
  const name = String(categoryName || "").trim();
  if (!name || typeof MarketSearch === "undefined") return;

  try {
    await MarketSearch.loadCatalog();
    const searchResult = MarketSearch.searchByCategory(name, { limit: 200 });
    const payload = {
      type: "market_search",
      query: name,
      results: searchResult.results || [],
      totalMatches: searchResult.totalMatches || 0,
      catalogSize: searchResult.catalogSize || MarketSearch.getCatalogSize(),
      source: "market-catalog",
      resultType: "category",
    };
    renderMarketResults(payload);
    SimaBridge.send("market_search", { text: name, category: name, source: "category" });
  } catch (e) {
    console.error("selectStoreCategory failed", e);
    showSearchError(t("loadError"));
  }
}

function renderMarketResultsLabel(payload) {
  const query = payload.query || "";
  if (payload.resultType === "category") {
    return `${escapeHtml(t("category"))}: <strong>${escapeHtml(localizeCategoryName(query))}</strong>`;
  }
  if (payload.resultType === "related") {
    return `${escapeHtml(t("relatedResultsFor"))}: <strong>${escapeHtml(query)}</strong>`;
  }
  return `${escapeHtml(t("search"))}: <strong>${escapeHtml(query)}</strong>`;
}

function ingestMarketSearchPayload(data) {
  const query = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.extractSearchQuery)
    ? SimaNativePayload.extractSearchQuery(data)
    : String(data.query || data.text || data.q || "").trim();
  const hasResults = Array.isArray(data.results);

  if (query) {
    dispatchVoiceSearch(query, data.source || (data.transcript ? "voice" : "native"));
    if (hasResults && data.results.length > 0) {
      window.setTimeout(function () {
        renderMarketResults(Object.assign({}, data, {
          query: query,
          source: data.source || "unity",
        }));
      }, 0);
    }
    return true;
  }

  renderIncomingPayload(data);
  return false;
}

  catch (e) {

    showSearchError(t("loadError"));
  }
};

window.handleUnityData = function(raw) {
  if (handleVoiceNativeMessage(raw)) return;
  let data = raw;
  if (typeof data === "string") {
    try { data = JSON.parse(data); } catch (e) { /* keep string for voice search */ }
  }
  if (data && typeof data === "object") {
    const floorHint = data.totemFloor
      || data.originFloor
      || data.floor
      || (data.character && data.character.floor)
      || (data.payload && (data.payload.totemFloor || data.payload.floor));
    if (floorHint) rememberTotemFloor(floorHint);

    if (data.totemPlaceId || data.originPlaceId) {
      if (!window.MAPVX_CONFIG) window.MAPVX_CONFIG = {};
      window.MAPVX_CONFIG.totemPlaceId = String(data.totemPlaceId || data.originPlaceId).trim();
    }

    if (data.characterName || data.displayName || data.character) {
      const name = String(
        data.characterName
        || data.displayName
        || (data.character && (data.character.displayName || data.character.name))
        || ""
      ).trim();
      if (name) {
        window.MALL_CHARACTER_NAME = name;
        window.MALL_CHARACTER = Object.assign({}, window.MALL_CHARACTER || {}, {
          displayName: name,
          id: (data.character && data.character.id) || data.characterId || undefined,
          floor: (data.character && data.character.floor) || data.floor || getTotemFloorContext() || undefined,
        });
        applyCharacterLabel();
      }
    }
  }
  buscarDesdeVoz(raw);
};

let voiceListeningActive = false;
let voiceListenTimeoutId = null;
let browserSpeechRecognition = null;

function clearVoiceListenTimeout() {
  if (voiceListenTimeoutId != null) {
    window.clearTimeout(voiceListenTimeoutId);
    voiceListenTimeoutId = null;
  }
}

function setVoiceListeningState(active, labelKey) {
  voiceListeningActive = !!active;
  const fab = document.getElementById("speakFab");
  const speakBtn = document.getElementById("btnSpeak");
  const speakMini = document.getElementById("btnSpeakMini");
  const label = labelKey ? t(labelKey) : speakButtonLabel();

  if (fab) fab.classList.toggle("is-listening", voiceListeningActive);
  if (speakBtn) {
    speakBtn.classList.toggle("is-listening", voiceListeningActive);
    speakBtn.textContent = voiceListeningActive ? label : speakButtonLabel();
    speakBtn.disabled = false;
  }
  if (speakMini) {
    speakMini.classList.toggle("is-listening", voiceListeningActive);
    speakMini.disabled = false;
  }

  if (!voiceListeningActive) clearVoiceListenTimeout();
}

function scheduleVoiceListenTimeout(ms) {
  clearVoiceListenTimeout();
  voiceListenTimeoutId = window.setTimeout(function () {
    if (!voiceListeningActive) return;
    setVoiceListeningState(false);
    SimaBridge.log("voice_listen_timeout");
  }, ms || 45000);
}

function getSpeechRecognitionLocale() {
  const locale = String(mobilityLocale || "es").toLowerCase();
  if (locale === "en") return "en-US";
  if (locale === "pt") return "pt-BR";
  return "es-CL";
}

function stopBrowserSpeechRecognition() {
  if (!browserSpeechRecognition) return;
  try { browserSpeechRecognition.abort(); } catch (e) { /* noop */ }
  browserSpeechRecognition = null;
}

function tryBrowserSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return false;

  stopBrowserSpeechRecognition();
  const recognition = new SpeechRecognition();
  browserSpeechRecognition = recognition;
  recognition.lang = getSpeechRecognitionLocale();
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false;

  recognition.onstart = function () {
    setVoiceListeningState(true, "voiceListening");
    SimaBridge.log("browser_stt_started locale=" + recognition.lang);
  };

  recognition.onresult = function (event) {
    const transcript = String(
      event.results
      && event.results[0]
      && event.results[0][0]
      && event.results[0][0].transcript
      || ""
    ).trim();
    setVoiceListeningState(false);
    browserSpeechRecognition = null;
    if (!transcript) {
      showSearchError(t("voiceNoSpeech"));
      return;
    }
    SimaBridge.log("browser_stt_result q=" + transcript);
    buscarDesdeVoz({
      type: "market_search",
      query: transcript,
      text: transcript,
      source: "browser-stt",
      locale: mobilityLocale,
    });
  };

  recognition.onerror = function (event) {
    setVoiceListeningState(false);
    browserSpeechRecognition = null;
    const code = String(event && event.error || "");
    SimaBridge.log("browser_stt_error code=" + code);
    if (code === "no-speech" || code === "aborted") {
      if (code === "no-speech") showSearchError(t("voiceNoSpeech"));
      return;
    }
    showSearchError(t("voiceError"));
  };

  recognition.onend = function () {
    browserSpeechRecognition = null;
    if (voiceListeningActive) setVoiceListeningState(false);
  };

  try {
    recognition.start();
    return true;
  } catch (error) {
    browserSpeechRecognition = null;
    setVoiceListeningState(false);
    SimaBridge.log("browser_stt_start_failed " + (error && error.message ? error.message : error));
    return false;
  }
}

function handleVoiceNativeMessage(raw) {
  const data = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.normalize)
    ? SimaNativePayload.normalize(raw)
    : raw;
  if (!data || typeof data !== "object") return false;

  const type = String(data.type || data.command || "").toLowerCase();
  if (type === "stt_started" || type === "stt_listening" || type === "voice_listening") {
    setVoiceListeningState(true, "voiceListening");
    scheduleVoiceListenTimeout();
    return true;
  }
  if (
    type === "stt_error"
    || type === "stt_cancel"
    || type === "stt_cancelled"
    || type === "stt_timeout"
    || type === "stt_end"
    || type === "voice_cancel"
  ) {
    setVoiceListeningState(false);
    if (type === "stt_error") {
      showSearchError(String(data.message || data.error || t("voiceError")));
    }
    return true;
  }
  return false;
}

function decodeBase64Utf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function dispatchVoiceSearch(query, source) {
  const q = String(query || "").trim();
  if (!q) return false;

  setVoiceListeningState(false);
  stopBrowserSpeechRecognition();

  ensureStoreSearchReady();
  showSearchInProgress(q);

  const prepared = (typeof MarketQueryI18n !== "undefined" && MarketQueryI18n.prepareVoiceQuery)
    ? String(MarketQueryI18n.prepareVoiceQuery(q, mobilityLocale) || "").trim()
    : q;
  const searchText = prepared || q;

  setStoreSearchInputs(q);

  marketSearchSeq++;
  SimaBridge.log(
    "voice_search q=" + q +
    (searchText !== q ? " prepared=" + searchText : "") +
    " source=" + (source || "native") +
    " locale=" + mobilityLocale +
    " catalogReady=" + (typeof MarketSearch !== "undefined" && MarketSearch.isReady && MarketSearch.isReady())
  );

  if (looksLikeServicesCatalogQuery(q) || looksLikeServicesCatalogQuery(searchText)) {
    // Local bathroom catalog only — avoid native services_search overwrite.
    SimaBridge.log("voice_search services local-catalog q=" + q);
    runServicesCatalogSearch(q, { source: source || "voice", voice: true });
    return true;
  }

  if (shouldNotifyUnityMarketSearch()) {
    SimaBridge.send("market_search", {
      text: searchText,
      rawText: q,
      source: source || "voice",
      locale: mobilityLocale,
    });
  }
  if (shouldUseLocalMarketCatalog()) {
    runMarketCatalogSearch(q, { seq: marketSearchSeq, voice: true });
  }
  return true;
}

function buscarDesdeVoz(raw) {
  if (raw == null) return;

  if (typeof raw === "object") {
    const data = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.normalize)
      ? SimaNativePayload.normalize(raw)
      : raw;

    if (typeof data === "string") {
      dispatchVoiceSearch(data, "voice");
      return;
    }

    if (!data || typeof data !== "object") {
      SimaBridge.log("buscarDesdeVoz ignored invalid object payload");
      return;
    }

    const query = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.extractSearchQuery)
      ? SimaNativePayload.extractSearchQuery(data)
      : String(data.query || data.text || data.q || "").trim();

    const knownTypes = {
      market_search: true,
      promotion_search: true,
      services_search: true,
      parking_info: true,
    };

    if (data.type === "market_search") {
      ingestMarketSearchPayload(data);
      return;
    }

    if (data.type && knownTypes[data.type]) {
      renderIncomingPayload(data);
      return;
    }

    if (query) {
      dispatchVoiceSearch(query, data.source || "voice");
      return;
    }

    if (data.type) {
      SimaBridge.log("buscarDesdeVoz unknown type without query type=" + data.type);
      renderIncomingPayload(data);
      return;
    }

    SimaBridge.log(
      "buscarDesdeVoz ignored payload without query/type keys=" +
      Object.keys(data || {}).join(",")
    );
    return;
  }

  let input = String(raw).trim();
  if (!input) return;

  if (input.startsWith("base64:")) {
    try { input = decodeBase64Utf8(input.substring(7)); }
    catch (e) {
      showSearchError("Error al leer los datos de la búsqueda.");
      return;
    }
  }

  if (input.startsWith("{") || input.startsWith("[")) {
    try {
      const parsed = JSON.parse(input);
      buscarDesdeVoz(parsed);
    } catch (e) { showSearchError("Error al mostrar los resultados."); }
    return;
  }

  dispatchVoiceSearch(input, "voice");
}

function renderIncomingPayload(dataJson) {
  if (!dataJson) return;

  const data = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.normalize)
    ? SimaNativePayload.normalize(dataJson)
    : dataJson;

  if (!data.type) {
    const fallbackQuery = (typeof SimaNativePayload !== "undefined" && SimaNativePayload.extractSearchQuery)
      ? SimaNativePayload.extractSearchQuery(data)
      : String(data.query || data.text || data.q || "").trim();
    if (fallbackQuery) {
      dispatchVoiceSearch(fallbackQuery, data.source || "native");
      return;
    }
    SimaBridge.log("renderIncomingPayload ignored: no type/query");
    return;
  }

  switch (data.type) {
    case "market_search": {
      const incomingQuery = String(
        (typeof SimaNativePayload !== "undefined" && SimaNativePayload.extractSearchQuery)
          ? SimaNativePayload.extractSearchQuery(data)
          : (data.query || data.text || data.q || "")
      ).trim();
      const hasResultsArray = Array.isArray(data.results);

      if (incomingQuery) setStoreSearchInputs(incomingQuery);

      if (hasResultsArray && data.results.length > 0) {
        renderMarketResults(Object.assign({}, data, {
          query: incomingQuery || data.query,
          source: data.source || "unity",
        }));
        break;
      }

      if (hasResultsArray && data.results.length === 0) {
        if (localMarketSearchAlreadyResolved(incomingQuery, marketSearchSeq)) {
          SimaBridge.log(
            "market_search unity empty kept local results: " + incomingQuery
          );
          if (incomingQuery) setStoreSearchInputs(incomingQuery);
          break;
        }
        renderMarketResults(Object.assign({}, data, {
          query: incomingQuery || data.query,
          source: data.source || "unity",
        }));
        break;
      }

      if (isMarketSearchUnityOnlyMode()) {
        renderMarketResults(data);
        break;
      }

      if (!incomingQuery) {
        SimaBridge.log("market_search missing query in payload keys=" + Object.keys(data || {}).join(","));
        break;
      }

      if (localMarketSearchAlreadyResolved(incomingQuery, marketSearchSeq)) {
        SimaBridge.log("market_search echo ignored (already resolved locally): " + incomingQuery);
        setStoreSearchInputs(incomingQuery);
        break;
      }

      dispatchVoiceSearch(incomingQuery, data.source || "native");
      break;
    }
    case "promotion_search":
      renderPromotionResults(data);
      break;
    case "services_search": {
      const incomingServiceQuery = String(
        data.query || data.text || data.q || data.search || ""
      ).trim();
      // Totem RN may push legacy bathroom/service payloads; prefer local catalog.
      if (incomingServiceQuery && looksLikeServicesCatalogQuery(incomingServiceQuery)) {
        SimaBridge.log(
          "services_search redirected to local catalog q=" + incomingServiceQuery
        );
        runServicesCatalogSearch(incomingServiceQuery, {
          source: data.source || "native-redirect",
          preferFloor: data.totemFloor || data.floor || getTotemFloorContext() || undefined,
        });
        break;
      }
      if (typeof ServicesCatalog !== "undefined" && ServicesCatalog.loadCatalog) {
        ServicesCatalog.loadCatalog().then(function () {
          enrichServicesSearchPayload(data);
          renderServicesResults(data);
        }).catch(function () {
          renderServicesResults(data);
        });
        break;
      }
      enrichServicesSearchPayload(data);
      renderServicesResults(data);
      break;
    }
    case "parking_info":
      renderParkingInfo(data);
      break;
    default:
      console.warn("Unknown payload type", data.type);
  }
}

function getStoreInitials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function getCencomallSiteOrigin() {
  return String(window.CENCOMALL_SITE_ORIGIN || "https://stg.cencomalls.cl").replace(/\/$/, "");
}

function resolveMediaUrl(url) {
  if (!url) return "";
  const u = String(url).trim();
  if (/^https?:\/\//i.test(u)) return u;
  const origin = getCencomallSiteOrigin();
  return u.startsWith("/") ? origin + u : origin + "/" + u;
}

function resolveStoreLogoUrl(result) {
  if (!result) return "";
  const raw = String(
    result.logoUrl || result.LogoUrl || result.logo || result.brand_logo || ""
  ).trim();
  return resolveMediaUrl(raw);
}

function resolveStorePhotos(result) {
  if (!result) return [];
  const raw = result.market_photos || result.marketPhotos || result["market-photos"];
  if (Array.isArray(raw)) {
    return raw.map((url) => String(url || "").trim()).filter(Boolean);
  }
  if (typeof raw === "string" && raw.trim()) return [raw.trim()];
  return [];
}

function resolveStorePhotoUrl(result) {
  const photos = resolveStorePhotos(result);
  return photos.length ? resolveMediaUrl(photos[0]) : "";
}

function onStoreDetailMediaError(img) {
  const fallbackLogo = img.getAttribute("data-fallback-logo") || "";
  if (fallbackLogo && img.classList.contains("store-detail-photo")) {
    img.classList.remove("store-detail-photo");
    img.classList.add("store-logo", "store-detail-logo");
    img.src = fallbackLogo;
    img.removeAttribute("data-fallback-logo");
    img.onerror = function () { onStoreLogoError(img); };
    return;
  }
  onStoreLogoError(img);
}

function onStoreLogoError(img) {
  const initials = img.getAttribute("data-initials") || "?";
  const hadDetail = img.classList.contains("store-detail-logo");
  const div = document.createElement("div");
  div.className = hadDetail ? "store-initials store-detail-logo" : "store-initials";
  div.textContent = initials;
  img.replaceWith(div);
}

function renderStoreAvatar(result, detail) {
  const name = result.name || result.brand || "Tienda";
  const initials = getStoreInitials(name);
  const logoUrl = resolveStoreLogoUrl(result);
  const extraClass = detail ? " store-detail-logo" : "";
  if (!logoUrl) {
    return `<div class="store-initials${extraClass}">${escapeHtml(initials)}</div>`;
  }
  return `<img class="store-logo${extraClass}" src="${escapeHtml(logoUrl)}" alt="" loading="lazy" data-initials="${escapeHtml(initials)}" onerror="onStoreLogoError(this)" />`;
}

function renderStoreDetailMedia(store) {
  const name = store.name || store.brand || "Tienda";
  const initials = getStoreInitials(name);
  const photoUrl = resolveStorePhotoUrl(store);
  const logoUrl = resolveStoreLogoUrl(store);
  const mediaUrl = photoUrl || logoUrl;

  if (!mediaUrl) {
    return `<div class="store-initials store-detail-logo">${escapeHtml(initials)}</div>`;
  }

  if (photoUrl) {
    return `<img class="store-detail-photo" src="${escapeHtml(photoUrl)}" alt="" loading="eager" data-initials="${escapeHtml(initials)}" data-fallback-logo="${escapeHtml(logoUrl)}" onerror="onStoreDetailMediaError(this)" />`;
  }

  return renderStoreAvatar(store, true);

function formatNivel(floor) {
  if (!floor) return "—";
  const f = String(floor).trim();
  if (f.toUpperCase() === "ALL") return t("allLevels");
  if (/^pb$/i.test(f) || /planta baja/i.test(f)) return t("gf");
  const m = f.match(/(\d+)/);
  if (m) return t("level") + " " + m[1];
  return f;
}

function getMapButtonLabelForFloor(floor) {
  const nivel = formatNivel(floor);
  if (!nivel || nivel === "—") return t("viewMap");
  return `${t("viewMap")} · ${nivel}`;
}

function formatServiceFloors(floors) {
  if (!floors || !floors.length) return "";
  if (floors.includes("ALL")) return t("allLevels");
  const labels = floors.map((f) => formatNivel(f)).filter(Boolean);
  if (labels.length <= 2) return labels.join(" · ");
  // Compact range for multi-floor elevator banks: PB–Nivel 5
  return labels[0] + "–" + labels[labels.length - 1];
}

function getServiceKind(svc) {
  const type = String((svc && svc.type) || "").toLowerCase();
  if (type === "elevator") return "elevator";
  if (type === "bathroom") {
    const n = String((svc && svc.name) || "").toLowerCase();
    if (n.includes("niños") || n.includes("ninos") || n.includes("mudador")) return "kids";
    return "bathroom";
  }
  const n = String((svc && (typeof svc === "string" ? svc : svc.name)) || "").toLowerCase();
  if (n.includes("ascensor") || n.includes("elevador") || n.includes("elevator")) return "elevator";
  if (n.includes("niños") || n.includes("ninos") || n.includes("mudador")) return "kids";
  if (n.includes("baño") || n.includes("bano") || n.includes("wc")) return "bathroom";
  return "";
}

function serviceKindIcon(kind) {
  if (kind === "elevator") return "🛗";
  if (kind === "kids") return "👶";
  if (kind === "bathroom") return "🚻";

function firstCategory(category) {

function truncate(text, max) {
  if (!text) return "";
  const clean = String(text).trim();
  return clean.length <= max ? clean : clean.substring(0, max - 1) + "…";
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function summarizeFloors(locations) {
  if (!locations || !locations.length) return "";
  return getSortedFloorLabelsFromLocations(locations).join(" · ");
}

function countDistinctFloors(locations) {
  if (!locations || !locations.length) return 0;
  const floorKeys = locations
    .map((loc) => formatNivel(loc && loc.floor))
    .map((f) => String(f || "").trim().toLowerCase())
    .filter(Boolean);
  return new Set(floorKeys).size;
}

function sanitizeStoreDisplayName(name) {
  let clean = String(name || "").trim();
  if (!clean) return "";

  // Common noisy suffixes coming from some navigation payloads.
  clean = clean.replace(/\s*-\s*(nivel(?:es)?|level(?:s)?)\s*[\d,\s]+\s*-\s*mall\s*cc\s*$/i, "");
  clean = clean.replace(/\s*-\s*(nivel(?:es)?|level(?:s)?)\s*[\d,\s]+$/i, "");
  clean = clean.replace(/\s*-\s*mall\s*cc\s*$/i, "");
  clean = clean.replace(/\s*-\s*mallcc\s*$/i, "");

  return clean.trim();
}

function formatStoreScheduleText(store) {
  if (!store) return "";

  const direct = store.schedule;
  if (typeof direct === "string" && direct.trim()) {
    return direct.trim();
  }

  let list = [];
  if (Array.isArray(store.schedules)) list = store.schedules;
  else if (Array.isArray(store.schedule)) list = store.schedule;
  else if (Array.isArray(store.market_schedules)) list = store.market_schedules;

  if (!list.length) return "";

  const parts = list.map((item) => {
    if (typeof item === "string") return item.trim();
    if (!item || typeof item !== "object") return "";
    const days = String(item.dias_txhorarios || item.days || item.day || "").trim();
    const hours = String(item.horas_txhorarios || item.hours || item.time || "").trim();
    if (days && hours) return `${days}: ${hours}`;
    return days || hours;
  }).filter(Boolean);

  return parts.join(" · ");
}

function getFloorSortMeta(floor) {
  const label = formatNivel(floor);
  const raw = String(floor || "").trim();

  if (!label || label === "—") {
    return { label: "", hasNumber: false, order: Number.POSITIVE_INFINITY };
  }

  if (/^pb$/i.test(raw) || /planta baja/i.test(raw)) {
    return { label: label, hasNumber: true, order: 0 };
  }

  const rawMatch = raw.match(/-?\d+/);
  const labelMatch = String(label).match(/-?\d+/);
  const numberText = rawMatch ? rawMatch[0] : (labelMatch ? labelMatch[0] : "");
  const order = numberText ? Number(numberText) : Number.POSITIVE_INFINITY;
  const hasNumber = isFinite(order);

  return { label: label, hasNumber: hasNumber, order: hasNumber ? order : Number.POSITIVE_INFINITY };
}

function compareFloorMeta(a, b) {
  if (a.hasNumber && b.hasNumber && a.order !== b.order) return a.order - b.order;
  if (a.hasNumber !== b.hasNumber) return a.hasNumber ? -1 : 1;
  return String(a.label || "").localeCompare(String(b.label || ""), "es");
}

function parseLocalFloorLevels(local) {
  const match = String(local || "").trim().match(/^CC_([^_]+)_/i);
  if (!match) return [];
  const segment = String(match[1] || "").trim().toUpperCase();
  if (!segment) return [];
  if (segment === "PB") return [0];
  return segment.split(",").map((part) => {
    const token = String(part || "").trim().toUpperCase();
    const nMatch = token.match(/^N(\d+)$/);
    if (nMatch) return Number(nMatch[1]);
    if (/^\d+$/.test(token)) return Number(token);
    return null;
  }).filter((n) => n != null);
}

function localSpecificityScore(local, floorMeta) {
  const floors = parseLocalFloorLevels(local);
  let score = 0;
  if (floors.length === 1) score += 200;
  if (floors.length > 1) score -= 40;
  if (floorMeta.hasNumber) {
    if (floors.length === 1 && floors[0] === floorMeta.order) score += 300;
    if (floors.indexOf(floorMeta.order) >= 0) score += 80;
    const exactToken = `N${floorMeta.order}_`;
    const localUpper = String(local || "").toUpperCase();
    if (localUpper.indexOf(`_${exactToken}`) >= 0 || localUpper.indexOf(`_${exactToken.replace("_", "")}`) >= 0) {
      score += 120;
    }
    if (new RegExp(`^CC_N${floorMeta.order}_`, "i").test(String(local || ""))) score += 180;
  }
  return score;
}

function locationMatchesFloor(loc, floorMeta) {
  if (!loc) return false;
  const locMeta = getFloorSortMeta(loc.floor);
  if (floorMeta.label && locMeta.label) {
    return floorMeta.label.toLowerCase() === locMeta.label.toLowerCase();
  }
  if (floorMeta.hasNumber && locMeta.hasNumber) {
    return floorMeta.order === locMeta.order;
  }
  return false;
}

function pickBestLocationForFloor(locations, referenceLoc) {
  const floorMeta = getFloorSortMeta(referenceLoc && referenceLoc.floor);
  let best = null;
  (locations || []).forEach((loc, locIdx) => {
    if (!locationMatchesFloor(loc, floorMeta)) return;
    const score = localSpecificityScore(loc.local, floorMeta);
    if (!best || score > best.score) {
      best = { loc: loc, locIdx: locIdx, score: score };
    }
  });
  return best;
}

function isMultiFloorLocal(local) {
  return parseLocalFloorLevels(local).length > 1;
}

function getDisplayLocationCount(locations) {
  return buildUniqueFloorRows(locations || []).length;
}

function buildUniqueFloorRows(locations) {
  const rows = [];

  (locations || []).forEach((loc, locIdx) => {
    const floorLabel = formatNivel(loc && loc.floor);
    const floorKey = String(floorLabel || "").trim().toLowerCase();
    if (!floorKey || floorKey === "—") return;

    const available = loc && loc.available !== false;
    const candidate = { loc: loc, locIdx: locIdx, floorLabel: floorLabel, available: available };
    const floorMeta = getFloorSortMeta(loc && loc.floor);
    const localCode = String(loc && loc.local || "").trim().toUpperCase();
    if (!localCode) {
      rows.push(candidate);
      return;
    }

    const duplicateIdx = rows.findIndex(function (row) {
      return row.floorLabel.toLowerCase() === floorKey
        && String(row.loc && row.loc.local || "").trim().toUpperCase() === localCode;
    });
    if (duplicateIdx >= 0) return;

    const sameFloorIdx = rows.findIndex(function (row) {
      return row.floorLabel.toLowerCase() === floorKey;
    });
    if (sameFloorIdx < 0) {
      rows.push(candidate);
      return;
    }

    const prev = rows[sameFloorIdx];
    const prevMulti = isMultiFloorLocal(prev.loc && prev.loc.local);
    const nextMulti = isMultiFloorLocal(loc && loc.local);

    if (prevMulti || nextMulti) {
      const prevScore = localSpecificityScore(prev.loc && prev.loc.local, floorMeta);
      const nextScore = localSpecificityScore(loc && loc.local, floorMeta);
      if (nextScore > prevScore || (available && !prev.available)) {
        rows[sameFloorIdx] = candidate;
      }
      return;
    }

    // Distinct single-floor stores on the same level (e.g. two Claro on PB).
    rows.push(candidate);
  });

  return rows.length
    ? rows
    : (locations || []).map(function (loc, locIdx) {
        return {
          loc: loc,
          locIdx: locIdx,
          floorLabel: formatNivel(loc && loc.floor),
          available: loc && loc.available !== false,
        };
      });
}

function getSortedFloorLabelsFromLocations(locations) {
  if (!locations || !locations.length) return [];

  const seen = {};
  const metas = [];

  locations.forEach((loc) => {
    const meta = getFloorSortMeta(loc && loc.floor);
    const key = String(meta.label || "").trim().toLowerCase();
    if (!key || key === "—" || seen[key]) return;
    seen[key] = true;
    metas.push(meta);
  });

  metas.sort(compareFloorMeta);
  return metas.map((m) => m.label);
}

function resolveStore(groupIndex, locationIndex) {
  const result = lastMarketPayload?.results?.[groupIndex];
  if (!result) return null;

  const base = {
    id: result.id,
    name: result.name,
    floor: result.floor,
    category: result.category,
    local: result.local,
    schedule: result.schedule,
    schedules: result.schedules,
    brand: result.brand,
    mall: result.mall,
    logoUrl: result.logoUrl,
    brand_logo: result.brand_logo,
    market_photos: result.market_photos,
    keywords: result.keywords,
    description: result.description,
    available: result.available !== false
  };

  if (
    locationIndex != null
    && result.isGroup
    && result.locations
    && result.locations[locationIndex]
  ) {
    const loc = result.locations[locationIndex];
    return {
      ...base,
      id: loc.id || base.id,
      name: loc.name || base.name,
      floor: loc.floor || base.floor,
      category: loc.category || base.category,
      local: loc.local || base.local,
      schedule: loc.schedule || base.schedule,
      schedules: Array.isArray(loc.schedules) && loc.schedules.length ? loc.schedules : base.schedules,
      market_photos: loc.market_photos || base.market_photos,
      available: loc.available !== false
    };
  }

  return base;
}

function findStoreInMarketPayload(localOrId) {
  const key = String(localOrId || "").trim().toLowerCase();
  if (!key || !lastMarketPayload?.results?.length) return null;

  for (let idx = 0; idx < lastMarketPayload.results.length; idx++) {
    const result = lastMarketPayload.results[idx];
    if (
      String(result.local || "").trim().toLowerCase() === key
      || String(result.id || "").trim().toLowerCase() === key
    ) {
      return resolveStore(idx);
    }
    if (result.locations?.length) {
      for (let locIdx = 0; locIdx < result.locations.length; locIdx++) {
        const loc = result.locations[locIdx];
        if (
          String(loc.local || "").trim().toLowerCase() === key
          || String(loc.id || "").trim().toLowerCase() === key
        ) {
          return resolveStore(idx, locIdx);
        }
      }
    }
  }
  return null;
}

function shortenSpeechText(text, maxWords, maxChars) {
  const raw = String(text || "").trim();
  if (!raw) return "";

  const sentence = raw.split(/[.!?]\s+/)[0].trim() || raw;
  const words = sentence.split(/\s+/).filter(Boolean);
  const wordLimit = Math.max(1, Number(maxWords) || 12);
  const charLimit = Math.max(20, Number(maxChars) || 120);
  const shortened = words.slice(0, wordLimit).join(" ");
  const clipped = shortened.length > charLimit
    ? shortened.slice(0, charLimit).replace(/\s+\S*$/, "").trim()
    : shortened;

  if (clipped && clipped.length < sentence.length) {
    return clipped.replace(/[,:;]+$/, "").trim();
  }
  return sentence.length > charLimit
    ? sentence.slice(0, charLimit).replace(/\s+\S*$/, "").trim()
    : sentence;
}

    if (distinctFloors <= 1) {
      const primaryIndex = result.locations.findIndex((loc) => loc && loc.available !== false);
      const fallbackIdx = primaryIndex >= 0 ? primaryIndex : 0;
      const bestSingle = pickBestLocationForFloor(result.locations, result.locations[fallbackIdx]) || {
        loc: result.locations[fallbackIdx] || {},
        locIdx: fallbackIdx,
      };
      const locIdx = bestSingle.locIdx;
      const loc = bestSingle.loc || {};

        ? `<button class="btn-ver-mapa" type="button" onclick="event.stopPropagation(); openStoreMap(${idx}, ${locIdx})">${escapeHtml(getMapButtonLabelForFloor(loc.floor))}</button>`

      const category = firstCategoryLocalized(loc.category || result.category);
      const categoryBadge = category
        ? `<span class="store-badge" title="${escapeHtml(localizeCategoryField(loc.category || result.category || ""))}">${escapeHtml(truncate(category, 14))}</span>`

          ${btn}

    }

    const displayName = result.name || result.brand || "Tienda";
    const category = firstCategoryLocalized(result.category);
    const categoryBadge = category
      ? `<span class="store-badge" title="${escapeHtml(localizeCategoryField(result.category))}">${escapeHtml(truncate(category, 14))}</span>`
      : "";
    const rowsSource = buildUniqueFloorRows(result.locations);
    const floorsSummary = summarizeFloors(rowsSource.map(function (row) { return row.loc; }));
    const displayLocationCount = rowsSource.length;

    rowsSource.sort((a, b) => compareFloorMeta(getFloorSortMeta(a && a.loc && a.loc.floor), getFloorSortMeta(b && b.loc && b.loc.floor)));

    const subRows = rowsSource.map((row) => {
      const loc = row.loc || {};

        ? `<button class="btn-ver-mapa-sm" type="button" onclick="openStoreMap(${idx}, ${locIdx})">${escapeHtml(mapLabel)}</button>`
        : `<button class="btn-ver-mapa-sm" type="button" disabled style="background:#B7B0C2">${escapeHtml(t("renovation"))} · ${escapeHtml(formatNivel(loc.floor))}</button>`;

      return `
        <div class="store-group-row map-only">
          ${mapBtn}
        </div>`;
    }).join("");

    return `
      <article class="store-card store-card-group fade-in">
        <div class="store-card-top">
          ${renderStoreAvatar(result)}
          <div class="store-name">${escapeHtml(displayName)}</div>
          <div class="store-meta">
            ${categoryBadge}
            ${result.promoBadge ? `<span class="store-badge store-badge-promo">Promo</span>` : ""}
            <span class="store-badge store-badge-locales">${displayLocationCount} ${escapeHtml(t("locales"))}</span>
          </div>
          ${floorsSummary ? `<div class="store-floors-summary">${escapeHtml(floorsSummary)}</div>` : ""}

  const btn = available
    ? `<button class="btn-ver-mapa" type="button" onclick="event.stopPropagation(); openStoreMap(${idx})">${escapeHtml(t("viewMap"))}</button>`
    : `<button class="btn-remodelacion" disabled>${escapeHtml(t("renovation"))}</button>`;
