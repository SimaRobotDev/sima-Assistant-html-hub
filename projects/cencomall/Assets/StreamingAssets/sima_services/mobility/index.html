function setMapStatus(text, isError) {
  const status = document.getElementById("map-status");
  if (!status) return;
  if (!text) {
    status.classList.add("hidden");
    status.textContent = "";
    return;
  }
  status.textContent = text;
  status.classList.remove("hidden");
  status.style.color = isError ? "#B42318" : "var(--cm-muted)";
}

function logMap(level, message, data) {
  const prefix = "[mobility/map]";
  const line = data !== undefined ? `${prefix} ${message} ${JSON.stringify(data)}` : `${prefix} ${message}`;
  if (level === "error") console.error(line);
  else if (level === "warn") console.warn(line);
  else console.log(line);
  if (typeof SimaBridge !== "undefined") {
    SimaBridge.send("mapvx_log", {
      level: level || "info",
      message: prefix + " " + message,
      data: data ? String(JSON.stringify(data)).slice(0, 500) : ""
    });
  }
}

function logMapVxConfig(context) {
  const cfg = window.MAPVX_CONFIG || {};
  const summary = typeof MapVxBridge !== "undefined" && MapVxBridge.configSummary
    ? MapVxBridge.configSummary(cfg)
    : {
        hasApiKey: !!(cfg.apiKey && cfg.apiKey.length),
        apiKeyLen: cfg.apiKey ? cfg.apiKey.length : 0,
        parentPlace: cfg.parentPlace || null,
        institutionId: cfg.institutionId || null
      };
  logMap("info", context + " MAPVX_CONFIG", summary);
  logMap("info", context + " sdkLoaded", {
    MapVX: typeof MapVX !== "undefined",
    MapVxBridge: typeof MapVxBridge !== "undefined",
    configured: typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured()
  });
}

function applyMapVxDefaultsFromMapPage() {
  if (!window.MAPVX_CONFIG) window.MAPVX_CONFIG = {};
  const cfg = window.MAPVX_CONFIG;

  // Keep mobility map behavior aligned with map/index defaults while
  // respecting Unity-injected values (e.g. totemPlaceId for route mode).
  if (!cfg.showStoreLabels) cfg.showStoreLabels = "featured";
  if (cfg.storeLabelMax == null) cfg.storeLabelMax = 0;
  if (cfg.storeLabelZoomDelta == null || !isFinite(Number(cfg.storeLabelZoomDelta))) {
    cfg.storeLabelZoomDelta = 1.2;
  }
  if (!cfg.lang && mobilityLocale) cfg.lang = mobilityLocale;
  if (cfg.totemPlaceId == null) cfg.totemPlaceId = "";
  const totemFloor = getTotemFloorContext();
  if (totemFloor && !cfg.totemFloor) cfg.totemFloor = totemFloor;

  if (!window.MAPVX_ASSETS_BASE) {
    window.MAPVX_ASSETS_BASE = "../shared/mapvx/";
  }

  return cfg;
}

function isMapVxConfigured() {
  return typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured && MapVxBridge.isConfigured();
}

async function warmupMapVxInBackground() {
  if (mapVxWarmupPromise || !isMapVxConfigured()) return mapVxWarmupPromise;

  const cfg = applyMapVxDefaultsFromMapPage();
  if (!cfg.apiKey || !cfg.parentPlace || !cfg.institutionId) return null;

  mapVxWarmupPromise = MapVxBridge.ensureReady(cfg)
    .then(function () {
      if (typeof MapVxBridge.prefetchMapCatalog === "function") {
        return MapVxBridge.prefetchMapCatalog(cfg).catch(function () { return false; });
      }
      return true;
    })
    .then(() => {
      SimaBridge.log("mobility map warmup completed");
      return true;
    })
    .catch((e) => {
      console.warn("MapVx warmup failed", e);
      SimaBridge.log("mobility map warmup failed");
      return false;
    });

  return mapVxWarmupPromise;
}

async function preloadMapVxBaseMap() {
  if (mapVxPreloadPromise) return mapVxPreloadPromise;
  if (!isMapVxConfigured()) return null;
  if (typeof MapVxBridge !== "undefined" && MapVxBridge.hasLiveMap && MapVxBridge.hasLiveMap()) {
    mapVxPreloadPromise = Promise.resolve(true);
    return mapVxPreloadPromise;
  }

  const cfg = applyMapVxDefaultsFromMapPage();
  if (!cfg.apiKey || !cfg.parentPlace || !cfg.institutionId) return null;

  const mapView = document.getElementById("map-view");
  const container = document.getElementById("mapvx-container");
  if (!mapView || !container || !mapView.classList.contains("hidden")) return null;

  mapView.classList.add("preload-mount");
  container.classList.remove("hidden");

  mapVxPreloadPromise = MapVxBridge.ensureMap(container, cfg)
    .then(() => {
      SimaBridge.log("mobility map base preload completed");
      return true;
    })
    .catch((e) => {
      console.warn("MapVx base preload failed", e);
      SimaBridge.log("mobility map base preload failed: " + (e.message || e));
      mapVxPreloadPromise = null;
      return false;
    })
    .finally(() => {
      if (mapView.classList.contains("hidden")) {
        mapView.classList.remove("preload-mount");
        container.classList.add("hidden");
      }
    });

  return mapVxPreloadPromise;
}

function setMapLoadingState(loading) {
  const wrap = document.querySelector(".map-embed-wrap");
  const container = document.getElementById("mapvx-container");
  const placeholder = document.getElementById("map-placeholder");
  const spinner = document.getElementById("map-loading-circle");
  if (!wrap || !container || !placeholder || !spinner) return;

  wrap.classList.toggle("is-loading", !!loading);
  wrap.classList.toggle("is-ready", !loading);
  if (loading) {
    placeholder.classList.add("hidden");
    spinner.classList.remove("hidden");
    container.style.opacity = "0";
  } else {
    container.style.opacity = "1";
    placeholder.classList.add("hidden");
    spinner.classList.add("hidden");
  }
}

function getMetersPerPixel(zoom, lat) {
  return 156543.03392 * Math.cos((lat || 0) * Math.PI / 180) / Math.pow(2, zoom || 0);
}

function formatVisibleWidthMeters(meters) {
  if (!isFinite(meters) || meters <= 0) return "";
  if (meters < 1000) return Math.round(meters) + " m";
  return (meters / 1000).toFixed(meters >= 10000 ? 0 : 1) + " km";
}

let mapZoomMeterTimer = null;

function updateMapZoomMeter() {
  const meter = document.getElementById("map-zoom-meter");
  const wrap = document.querySelector(".map-embed-wrap");
  const mapView = document.getElementById("map-view");
  if (!meter || !wrap || !mapView || mapView.classList.contains("hidden")) return;
  if (typeof MapVxBridge === "undefined" || !MapVxBridge.getMapViewState) {
    meter.classList.add("hidden");
    return;
  }
  const state = MapVxBridge.getMapViewState();
  if (!state || state.zoom == null) {
    meter.classList.add("hidden");
    return;
  }
  const lat = state.center && state.center.lat != null ? state.center.lat : 0;
  const visibleMeters = getMetersPerPixel(state.zoom, lat) * (wrap.clientWidth || 0);
  meter.textContent = String(t("zoomMeterLabel") || "")
    .replace("{zoom}", state.zoom.toFixed(1))
    .replace("{distance}", formatVisibleWidthMeters(visibleMeters));
  meter.classList.remove("hidden");
}

function startMapZoomMeter() {
  stopMapZoomMeter();
  updateMapZoomMeter();
  mapZoomMeterTimer = window.setInterval(updateMapZoomMeter, 300);
}

function stopMapZoomMeter() {
  if (mapZoomMeterTimer) {
    window.clearInterval(mapZoomMeterTimer);
    mapZoomMeterTimer = null;
  }
}

function attachMapZoomLabelSwitcher(result) {
  // Label expansion on zoom is handled by MapVxBridge.attachZoomLabelSwitcher.
}

function useMapVxSdk() {
  const ok = typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured();
  if (!ok) {
    logMap("warn", "useMapVxSdk=false", {
      bridge: typeof MapVxBridge !== "undefined",
      configured: typeof MapVxBridge !== "undefined" ? MapVxBridge.isConfigured() : false,
      mapUrl: MAP_SERVICE_BASE_URL || window.MALL_MAP_BASE_URL || ""
    });
  }
  return ok;
}

function resetMapControls() {
  const floorBadge = document.getElementById("map-current-floor");
  const routeBtn = document.getElementById("map-route-btn");
  if (floorBadge) {
    floorBadge.classList.add("hidden");
    floorBadge.textContent = "";
  }
  if (routeBtn) {
    routeBtn.classList.add("hidden");
    routeBtn.disabled = false;
    routeBtn.classList.remove("disabled");
    routeBtn.textContent = t("viewRoute");
  }
}

function updateMapRouteButton(result) {
  const btn = document.getElementById("map-route-btn");
  if (!btn) return;
  const canRoute = typeof MapVxBridge !== "undefined"
    && MapVxBridge.hasRouteOrigin
    && MapVxBridge.hasRouteOrigin();
  btn.classList.remove("hidden");
  if (!canRoute) {
    btn.textContent = t("routeNeedsTotem");
    btn.classList.add("disabled");
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  btn.classList.remove("disabled");
  const active = !!(result && (result.routeActive || result.routeStarted));
  btn.textContent = active ? t("clearRoute") : t("viewRoute");
}

function renderMapFloorBar(activeFloorKey) {
  const badge = document.getElementById("map-current-floor");
  if (!badge || typeof MapVxBridge === "undefined" || !MapVxBridge.getMapFloors) return;
  const floors = MapVxBridge.getMapFloors() || [];
  if (!floors.length) {
    badge.classList.add("hidden");
    badge.textContent = "";
    return;
  }
  const active = floors.find(function (f) { return f.key === activeFloorKey; }) || floors[0];
  badge.textContent = active ? active.label : "";
  badge.classList.toggle("hidden", !active || !active.label);
}

async function onMapFloorSelect(floorKey) {
  if (!floorKey || typeof MapVxBridge === "undefined" || !MapVxBridge.switchFloor) return;
  try {
    await MapVxBridge.switchFloor(floorKey);
    renderMapFloorBar(floorKey);
  } catch (e) {
    logMap("error", "onMapFloorSelect failed", { floorKey, message: e.message || String(e) });
  }
}

async function onMapRouteToggle() {
  const btn = document.getElementById("map-route-btn");
  if (!btn || btn.disabled || typeof MapVxBridge === "undefined" || !MapVxBridge.toggleRouteToTarget) return;
  try {
    const state = await MapVxBridge.toggleRouteToTarget();
    btn.textContent = state.active ? t("clearRoute") : t("viewRoute");
    const session = MapVxBridge.getMapSession && MapVxBridge.getMapSession();
    const title = session && session.result ? session.result.title : "";
    setMapStatus(title + (state.active ? " · " + t("routeActive") : ""));
  } catch (e) {
    setMapStatus(t("routeError") + ": " + (e.message || e));
    logMap("error", "onMapRouteToggle failed", { message: e.message || String(e) });
  }
}

function setupMapControls(result) {
  updateMapRouteButton(result);
  const activeFloor = result && result.floorId ? result.floorId : null;
  renderMapFloorBar(activeFloor);
  const routeBtn = document.getElementById("map-route-btn");
  if (routeBtn && !routeBtn._bound) {
    routeBtn._bound = true;
    routeBtn.onclick = onMapRouteToggle;
  }
}

async function openPoiMapViaMapVx(opts) {
  const {
    poiType, id, floor, mall, name, local, mode,
    anchorLocal, poiRef, mapvxId, lat, lng, preferChangingTable, serviceId, serviceType,
    routeApproachQuery, routeApproachLocal, routeApproachWeight, routeApproachMaxMeters, routeApproachPullFrom,
  } = opts || {};
  const container = document.getElementById("mapvx-container");
  const iframe = document.getElementById("map-iframe");

  logMap("info", "openPoiMapViaMapVx start", opts);
  logMapVxConfig("openPoiMapViaMapVx");
  warmupMapVxInBackground();

  applyMapVxDefaultsFromMapPage();

  iframe.classList.add("hidden");
  iframe.src = "";
  setMapLoadingState(true);
  container.classList.remove("hidden");

  const mapAlreadyLive = typeof MapVxBridge.hasLiveMap === "function" && MapVxBridge.hasLiveMap();
  if (mapAlreadyLive && typeof MapVxBridge.notifyMapContainerShown === "function") {
    MapVxBridge.notifyMapContainerShown(container);
  }

  const preloadPromise = mapVxPreloadPromise;
  const mapReused = mapAlreadyLive || (preloadPromise ? await preloadPromise : false);
  if (!mapReused && typeof MapVxBridge !== "undefined" && MapVxBridge.destroyMap) {
    MapVxBridge.destroyMap();
    container.innerHTML = "";
  }
  resetMapControls();
  setMapStatus(t("mapLoading") || "Cargando mapa…");

  try {
    const isService = poiType === "service";
    let showFn;
    if (isService) {
      showFn = (mode === "navigation" && MapVxBridge.showServiceRouteTo)
        ? MapVxBridge.showServiceRouteTo
        : MapVxBridge.showServicePlace;
    } else {
      showFn = (mode === "navigation" && MapVxBridge.showRouteTo)
        ? MapVxBridge.showRouteTo
        : MapVxBridge.showPlace;
    }

    const bridgeOptions = isService
      ? {
          poiType: "service",
          serviceType: serviceType || "bathroom",
          serviceId: serviceId || id,
          id: serviceId || id,
          name,
          floor,
          mall,
          anchorLocal: anchorLocal || local,
          routeApproachQuery,
          routeApproachLocal,
          routeApproachWeight,
          routeApproachMaxMeters,
          routeApproachPullFrom,
          poiRef,
          mapvxId,
          lat,
          lng,
          preferChangingTable: !!preferChangingTable,
        }
      : {
          id,
          name,
          floor,
          local,
          mall,
          strictLocal: opts.strictLocal,
          poiType,
        };

    logMap("info", "calling MapVxBridge", { fn: showFn.name || "showPlace", isService });
    const result = await showFn(container, bridgeOptions);
    setMapStatus("");
    setupMapControls(result);
    setMapLoadingState(false);
    startMapZoomMeter();
    attachMapZoomLabelSwitcher(result);
    logMap("info", "openPoiMapViaMapVx success", result);
    window.__mapVxLastLog = { ts: Date.now(), phase: "success", result: result };
  } catch (e) {
    logMap("error", "openPoiMapViaMapVx failed", {
      message: e.message || String(e),
      attempts: e.attempts || null
    });
    window.__mapVxLastLog = {
      ts: Date.now(),
      phase: "error",
      message: e.message || String(e),
      attempts: e.attempts || null
    };
    container.classList.add("hidden");
    MapVxBridge.destroyMap();
    mapVxPreloadPromise = null;
    if (container) container.innerHTML = "";
    setMapLoadingState(false);
    stopMapZoomMeter();
    const placeholder = document.getElementById("map-placeholder");
    const attemptsHtml = e.attempts && e.attempts.length
      ? `<br><small>${escapeHtml(JSON.stringify(e.attempts))}</small>`
      : "";
    placeholder.innerHTML =
      `<div><strong>${escapeHtml(t("mapError") || "No se pudo cargar el mapa")}</strong><br><br>` +
      `${escapeHtml(name || "")}<br>` +
      `${escapeHtml(String(e.message || e))}` +
      attemptsHtml +
      `</div>`;
    placeholder.classList.remove("hidden");
    setMapStatus("");
  }
}

function openPoiMapViaIframe({ poiType, id, floor, mall, name, local }) {
  logMap("warn", "openPoiMapViaIframe fallback (MapVX not configured or unavailable)", {
    poiType, id, floor, name
  });
  const iframe = document.getElementById("map-iframe");
  const container = document.getElementById("mapvx-container");
  const placeholder = document.getElementById("map-placeholder");
  const params = new URLSearchParams();
  if (mall) params.set("mall", mall);

  if (poiType === "service") {
    if (id) params.set("serviceId", id);
    if (name) params.set("serviceName", name);
  } else {
    if (id) params.set("storeId", id);
    if (floor) params.set("floor", floor);
    if (local) params.set("local", local);
    if (name) params.set("storeName", name);
  }
  if (floor) params.set("floor", floor);

  const mapUrl = MAP_SERVICE_BASE_URL || window.MALL_MAP_BASE_URL || "";
  container.classList.add("hidden");
  setMapLoadingState(false);
  if (mapUrl) {
    const fullUrl = mapUrl + (mapUrl.includes("?") ? "&" : "?") + params.toString();
    logMap("info", "iframe map URL", { url: fullUrl });
    iframe.src = fullUrl;
    iframe.classList.remove("hidden");
    placeholder.classList.add("hidden");
    setMapStatus("");
  } else {
    iframe.src = "";
    iframe.classList.add("hidden");
    placeholder.classList.remove("hidden");
    placeholder.innerHTML =
      `<div><strong>${escapeHtml(t("mapComingSoon"))}</strong><br><br>` +
      `${escapeHtml(name || "")}<br>` +
      `${floor ? `${escapeHtml(t("level"))}: ${escapeHtml(formatNivel(floor))}` : ""}</div>`;
    setMapStatus("");
  }
}

function storeMapKey(store) {
  if (!store) return "";
  const local = store.local != null ? String(store.local).trim() : "";
  const id = store.id != null ? String(store.id).trim() : "";
  return local || id;
}

function storeCatalogId(store) {
  if (!store || store.id == null) return "";
  return String(store.id).trim();
}

function openPoiMap(opts) {
  const {
    poiType, id, floor, mall, name, local, catalogId, mode, storeDetail,
    anchorLocal, poiRef, mapvxId, lat, lng, preferChangingTable, serviceId, serviceType,
    routeApproachQuery, routeApproachLocal, routeApproachWeight, routeApproachMaxMeters, routeApproachPullFrom,
  } = opts || {};

  const isService = poiType === "service";
  const mapLocal = (local != null && String(local).trim()) || "";
  const serviceKey = (serviceId != null && String(serviceId).trim())
    || (isService && id != null && String(id).trim())
    || "";
  const mapCatalogId = (catalogId != null && String(catalogId).trim())
    || (id != null && /^\d+$/.test(String(id).trim()) ? String(id).trim() : "");

  logMap("info", "openPoiMap called", {
    poiType, id, catalogId: mapCatalogId, floor, mall, name,
    local: mapLocal, serviceKey, serviceType, mode,
  });

  if (isService) {
    if (!serviceKey && !name) {
      logMap("error", "openPoiMap aborted: missing service id/name", { poiType });
      return;
    }
  } else if (!mapLocal && !mapCatalogId) {
    logMap("error", "openPoiMap aborted: missing local/id", { name, poiType });
    return;
  }

  const mapTitleText = document.getElementById("map-view-title-text");
  if (mapTitleText) {
    mapTitleText.textContent = poiType === "store"
      ? (t("mapStoreLocation") || "Ubicación de la tienda")
      : (poiType === "service" ? (t("mapServiceLocation") || "Ubicación del servicio") : (name || t("map") || "Mapa"));
  }
  document.querySelector(".cm-body").style.display = "none";
  document.querySelector(".cm-speak-fab").style.display = "none";
  document.getElementById("map-view").classList.remove("hidden");

  if (poiType === "store" && storeDetail) {
    renderStoreDetailPanel(storeDetail);
    speakStoreDetail(storeDetail);
  } else {
    hideStoreDetailPanel();
    if (isService && name) {
      SimaBridge.speak(String(name));
    }
  }

  const mapOptions = isService
    ? {
        poiType,
        id: serviceKey,
        serviceId: serviceKey,
        serviceType: serviceType || "bathroom",
        floor,
        mall,
        name,
        anchorLocal,
        routeApproachQuery,
        routeApproachLocal,
        routeApproachWeight,
        routeApproachMaxMeters,
        routeApproachPullFrom,
        poiRef,
        mapvxId,
        lat,
        lng,
        preferChangingTable,
        mode,
      }
    : {
        poiType,
        id: mapCatalogId || mapLocal,
        catalogId: mapCatalogId,
        floor,
        mall,
        name,
        local: mapLocal,
        strictLocal: poiType === "store" && !!mapLocal,
        mode,
      };

  const doOpen = function() {
    if (useMapVxSdk()) {
      openPoiMapViaMapVx(mapOptions);
    } else {
      logMap("warn", "MapVX not ready after wait; iframe/placeholder fallback", mapOptions);
      openPoiMapViaIframe(mapOptions);
    }
  };

  waitForMapVxReady(doOpen);

  const eventType = poiType === "service" ? "service_map_opened" : "store_map_opened";
  SimaBridge.send(eventType, {
    id: isService ? serviceKey : mapLocal,
    text: name || "",
    destination: formatNivel(floor),
    anchorLocal: anchorLocal || "",
  });
}

window.pushNavigationFromUnity = function(data) {
  try {
    const payload = typeof data === "string" ? JSON.parse(data) : data;
    logMap("info", "pushNavigationFromUnity", payload);
    const cleanName = sanitizeStoreDisplayName(payload.name);
    const mapKey = payload.local || payload.placeId || payload.id;
    const catalogId = payload.catalogId || (payload.id && /^\d+$/.test(String(payload.id)) ? String(payload.id) : "");
    const storeDetail = findStoreInMarketPayload(mapKey) || {
      name: cleanName,
      floor: payload.floor,
      mall: payload.mall,
      local: mapKey,
      id: catalogId || payload.id
    };
    openPoiMap({
      poiType: "store",
      id: catalogId || mapKey,
      catalogId: catalogId || storeCatalogId(storeDetail),
      floor: payload.floor,
      mall: payload.mall,
      name: cleanName,
      local: mapKey,
      mode: "navigation",
      storeDetail: storeDetail
    });
  } catch (e) {
    logMap("error", "pushNavigationFromUnity failed", { message: e.message });
  }
};

function waitForMapVxReady(fn, attempt) {
  attempt = attempt || 0;
  try {
    if (typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured && MapVxBridge.isConfigured()) {
      fn();
      return;
    }
  } catch (e) { /* retry */ }
  if (attempt > 150) {
    logMap("error", "waitForMapVxReady timeout", {
      MapVxBridge: typeof MapVxBridge,
      MapVX: typeof MapVX,
      hasCfg: !!(window.MAPVX_CONFIG && window.MAPVX_CONFIG.apiKey)
    });
    try { fn(); } catch (e2) { logMap("error", "waitForMapVxReady fallback failed", { message: e2.message }); }
    return;
  }
  setTimeout(function () { waitForMapVxReady(fn, attempt + 1); }, 100);
}

function openStoreMap(groupIndex, locationIndex) {
  const store = resolveStore(groupIndex, locationIndex);
  const mapLocal = store && store.local != null ? String(store.local).trim() : "";
  const mapCatalogId = storeCatalogId(store);
  const mapKey = mapLocal || mapCatalogId;
  logMap("info", "openStoreMap", { groupIndex, locationIndex, store, mapLocal, mapCatalogId, mapKey });
  if (!store || store.available === false) {
    logMap("warn", "openStoreMap skipped", { reason: !store ? "no store" : "unavailable" });
    return;
  }
  if (!mapKey) {
    logMap("error", "openStoreMap aborted: no local/id on store", { name: store.name });
    return;
  }

  openPoiMap({
    poiType: "store",
    id: mapCatalogId || mapLocal,
    catalogId: mapCatalogId,
    floor: store.floor,
    mall: store.mall,
    name: store.name || store.brand,
    local: mapLocal,
    mode: "place",
    storeDetail: store
  });
}

function openServiceMap(idx) {
  const svc = lastServicesPayload?.results?.[idx];
  if (!svc) return;

  const normalized = normalizeServiceResult(svc);
  const floors = Array.isArray(normalized.floors) ? normalized.floors : [];
  const totemFloor = (typeof MapVxBridge !== "undefined"
    && MapVxBridge.configSummary
    && (MapVxBridge.configSummary().totemFloor || MapVxBridge.configSummary().floor))
    || (window.MAPVX_CONFIG && (window.MAPVX_CONFIG.totemFloor || window.MAPVX_CONFIG.floor))
    || "";
  const totemKey = typeof ServicesCatalog !== "undefined" && ServicesCatalog.normalizeFloorKey
    ? ServicesCatalog.normalizeFloorKey(totemFloor)
    : String(totemFloor || "").trim();
  const floorFromTotem = totemKey
    ? floors.find(function (f) {
        const key = ServicesCatalog.normalizeFloorKey
          ? ServicesCatalog.normalizeFloorKey(f)
          : String(f || "");
        return key && key === totemKey;
      })
    : "";
  // Prefer floor encoded in MapVX local (CC_N3_3208 → 3) over floors[0]=PB on multi-bank elevators.
  let floorFromAnchor = "";
  const localHint = String(normalized.anchorLocal || "").toUpperCase();
  const localFloorMatch = localHint.match(/_N(\d+)_/) || localHint.match(/_PB_/);
  if (localFloorMatch) {
    floorFromAnchor = localFloorMatch[1] != null ? localFloorMatch[1] : "PB";
  }
  const floor = floorFromTotem
    || floorFromAnchor
    || floors.find((f) => f && f !== "ALL" && String(f).toUpperCase() !== "PB")
    || floors.find((f) => f !== "ALL")
    || floors[0]
    || "";
  const canRoute = typeof MapVxBridge !== "undefined"
    && MapVxBridge.hasRouteOrigin
    && MapVxBridge.hasRouteOrigin();

  // Re-resolve floor-aware anchor for elevators (Ripley N5 → Burger King, etc.).
  let anchorLocal = normalized.anchorLocal;
  let routeApproachQuery = normalized.routeApproachQuery || "";
  let routeApproachLocal = normalized.routeApproachLocal || "";
  let routeApproachWeight = normalized.routeApproachWeight;
  let routeApproachMaxMeters = normalized.routeApproachMaxMeters;
  let routeApproachPullFrom = normalized.routeApproachPullFrom || "";
  if (normalized.type === "elevator" && typeof ServicesCatalog !== "undefined" && ServicesCatalog.getById) {
    const entry = ServicesCatalog.getById(normalized.id || normalized.catalogId);
    if (entry) {
      const card = ServicesCatalog.toResultCard(entry, {
        preferFloor: floor || totemKey || "",
        floor: floor || totemKey || "",
      });
      if (card.anchorLocal) anchorLocal = card.anchorLocal;
      if (card.routeApproachQuery) routeApproachQuery = card.routeApproachQuery;
      if (card.routeApproachLocal) routeApproachLocal = card.routeApproachLocal;
      if (card.routeApproachWeight != null) routeApproachWeight = card.routeApproachWeight;
      if (card.routeApproachMaxMeters != null) routeApproachMaxMeters = card.routeApproachMaxMeters;
      if (card.routeApproachPullFrom) routeApproachPullFrom = card.routeApproachPullFrom;
    }
  }

  openPoiMap({
    poiType: "service",
    serviceType: normalized.type || "bathroom",
    serviceId: normalized.id || normalized.catalogId,
    id: normalized.id || normalized.catalogId,
    floor: floor === "ALL" ? "" : floor,
    mall: normalized.mall || lastServicesPayload?.mall,
    name: normalized.name,
    anchorLocal: anchorLocal,
    routeApproachQuery: routeApproachQuery || undefined,
    routeApproachLocal: routeApproachLocal || undefined,
    routeApproachWeight: routeApproachWeight != null ? routeApproachWeight : undefined,
    routeApproachMaxMeters: routeApproachMaxMeters != null ? routeApproachMaxMeters : undefined,
    routeApproachPullFrom: routeApproachPullFrom || undefined,
    poiRef: normalized.poiRef,
    mapvxId: normalized.mapvxId,
    lat: normalized.mapvxLat,
    lng: normalized.mapvxLng,
    preferChangingTable: !!(normalized.features && normalized.features.mudador),
    mode: canRoute ? "navigation" : "place",
  });
}

function closeMapView() {
  const container = document.getElementById("mapvx-container");
  const mapKept = typeof MapVxBridge !== "undefined"
    && MapVxBridge.suspendMap
    && MapVxBridge.hasLiveMap
    && MapVxBridge.hasLiveMap();

  if (typeof MapVxBridge !== "undefined") {
    if (MapVxBridge.suspendMap) {
      MapVxBridge.suspendMap();
    } else if (MapVxBridge.clearActiveRoute) {
      MapVxBridge.clearActiveRoute();
      MapVxBridge.destroyMap();
    }
  }
  if (!mapKept) {
    mapVxPreloadPromise = null;
    if (container) container.innerHTML = "";
  }
  stopMapZoomMeter();
  resetMapControls();
  hideStoreDetailPanel();
  document.getElementById("map-view").classList.add("hidden");
  document.getElementById("map-iframe").src = "";
  document.getElementById("map-iframe").classList.add("hidden");
  if (container) container.classList.add("hidden");
  document.getElementById("map-placeholder").classList.add("hidden");
  setMapLoadingState(false);
  setMapStatus("");
  document.querySelector(".cm-body").style.display = "";
  document.querySelector(".cm-speak-fab").style.display = "";
}

function startVoiceInput() {
  if (voiceListeningActive) {
    stopBrowserSpeechRecognition();
    setVoiceListeningState(false);
    SimaBridge.send("stop_stt", { screen: "mobility", source: "hablar_button" });
    return;
  }

  const payload = {
    screen: "mobility",
    mode: getMobilityMode() || "store_search",
    locale: mobilityLocale,
    host: (SimaBridge.isReactNativeHost && SimaBridge.isReactNativeHost()) ? "react-native" : "legacy",
    source: "hablar_button",
  };

  setVoiceListeningState(true, "voiceListening");
  SimaBridge.log(
    "start_stt mode=" + payload.mode +
    " locale=" + payload.locale +
    " host=" + payload.host
  );

  if (typeof SimaBridge.animate === "function") {
    SimaBridge.animate("listening");
  }

  const sent = (typeof SimaBridge.start_stt === "function")
    ? SimaBridge.start_stt(payload)
    : SimaBridge.send("start_stt", payload);

  if (sent) {
    scheduleVoiceListenTimeout();
    return;
  }

  if (isLocalHtmlMode() && tryBrowserSpeechRecognition()) {
    scheduleVoiceListenTimeout(30000);
    return;
  }

  setVoiceListeningState(false);
  SimaBridge.log("start_stt_unavailable channel=" + (SimaBridge.getLastSendChannel ? SimaBridge.getLastSendChannel() : "unknown"));
  showSearchError(t("voiceUnavailable"));
}
