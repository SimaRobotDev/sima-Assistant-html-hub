<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cenco Costanera</title>
<!-- mobility-ui-v24 -->
<link rel="stylesheet" href="../shared/app.css" />
<link rel="stylesheet" href="../shared/mapvx/styles.css" />
<script src="../shared/locale.js"></script>
<script src="../shared/bridge.js"></script>
<script src="../shared/mapvx/index.js"></script>
<script src="../shared/mapvx-bridge.js"></script>
<style>
:root {
  --cm-purple: #5B2D8E;
  --cm-purple-dark: #3D1D5C;
  --cm-pink: #E4007C;
  --cm-surface: #F4F0F8;
  --cm-card: #FFFFFF;
  --cm-text: #1E1630;
  --cm-muted: #6B6280;
  --cm-line: #E7DFF0;
  --cm-shadow: 0 8px 24px rgba(61, 29, 92, 0.1);
  --cm-speak-bar: 132px;
  --cm-header-height: 54px;
  --cm-survey-strip-height: 0px;
}

.app-shell.has-survey { --cm-survey-strip-height: 76px; }

html, body {
  background: transparent;
  scroll-padding-bottom: calc(var(--cm-speak-bar) + env(safe-area-inset-bottom, 0px));
}
body.cencomall-theme { color: var(--cm-text); margin: 0; }

.cencomall-theme .app-shell {
  max-width: 1080px;
  padding: 0 0 calc(var(--cm-speak-bar) + env(safe-area-inset-bottom, 0px));
  gap: 0;
  background: var(--cm-surface);
  min-height: 100%;
}

.cm-header {
  position: sticky;
  top: 0;
  z-index: 40;
  background: linear-gradient(135deg, var(--cm-purple-dark) 0%, var(--cm-purple) 100%);
  color: #fff;
  padding: 14px 18px 16px;
  box-shadow: var(--cm-shadow);
}

.cm-header-title {
  margin: 0;
  font-size: 22px;
  font-weight: 800;
}

.test-version-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: 10px;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.02em;
  vertical-align: middle;
}

.cm-body {
  padding: 14px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.cm-panel {
  background: var(--cm-card);
  border-radius: 16px;
  padding: 14px;
  box-shadow: var(--cm-shadow);
  border: 1px solid var(--cm-line);
}

.cm-survey-strip {
  position: sticky;
  top: var(--cm-header-height);
  z-index: 35;
  background: linear-gradient(180deg, #FFF 0%, #FAF7FD 100%);
  border-bottom: 1px solid var(--cm-line);
  box-shadow: 0 4px 14px rgba(61, 29, 92, 0.07);
  padding: 8px 10px 8px 12px;
  animation: fadeIn 0.25s ease;
}

.cm-survey-strip.hidden { display: none; }

.cm-survey-strip-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cm-survey-strip-text {
  flex: 1;
  min-width: 0;
}

.cm-survey-title {
  margin: 0 0 2px;
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
}

.cm-star-rating {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

.cm-star-btn {
  width: 36px;
  height: 36px;
  border: 2px solid var(--cm-line);
  border-radius: 9px;
  background: #fff;
  color: #C4B8D4;
  font-size: 18px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
}

.cm-star-btn:hover,
.cm-star-btn:focus-visible {
  border-color: #D4B85A;
  background: #FFF9E8;
}

.cm-star-btn.active,
.cm-star-btn.selected {
  border-color: #E6A800;
  background: #FFF6D6;
  color: #E6A800;
}

.cm-star-btn:active { transform: scale(0.94); }

.cm-star-hint {
  font-size: 10px;
  color: var(--cm-muted);
  margin: 0;
  line-height: 1.2;
}

.cm-survey-dismiss {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: #F0E9F8;
  color: var(--cm-muted);
  font-size: 18px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
}

.cm-survey-dismiss:active { transform: scale(0.94); }

.cm-survey-strip.is-thanks .cm-survey-strip-inner {
  justify-content: center;
  padding: 2px 0;
}

.cm-survey-thanks-msg {
  font-size: 13px;
  font-weight: 700;
  color: var(--cm-purple-dark);
  margin: 0;
  text-align: center;
}

.cm-welcome {
  text-align: center;
  padding: 16px 10px;
  color: var(--cm-muted);
  font-size: 14px;
  line-height: 1.5;
}

.cm-results-sticky {
  background: var(--cm-card);
  margin: -14px -14px 10px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--cm-line);
  border-radius: 16px 16px 0 0;
}

.cm-results-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.cm-results-title { font-size: 17px; font-weight: 800; margin: 0; }

.cm-results-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--cm-purple);
  background: #F0E9F8;
  padding: 4px 8px;
  border-radius: 999px;
}

.cm-results-query {
  font-size: 13px;
  color: var(--cm-muted);
  margin: 0;
}

.result-block { padding-bottom: 8px; }

.store-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  padding-bottom: 24px;
}

.store-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid var(--cm-line);
  box-shadow: 0 4px 14px rgba(61, 29, 92, 0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.store-card-top { padding: 10px 10px 8px; flex: 1; }

.store-initials {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, #EFE5FA 0%, #DCC9F2 100%);
  color: var(--cm-purple-dark);
  font-size: 14px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  align-self: center;
}

.store-logo {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: #F6F1FB;
  object-fit: contain;
  margin: 0 auto 8px;
  display: block;
  align-self: center;
}

.store-name {
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.store-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }

.store-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 6px;
  border-radius: 999px;
  background: #F6F1FB;
  color: var(--cm-purple-dark);
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.store-badge-floor { background: #EAF3FF; color: #1455A0; }

.store-detail {
  font-size: 10px;
  color: var(--cm-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-ver-mapa,
.btn-remodelacion {
  width: 100%;
  border: none;
  font-size: 11px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
}

.btn-ver-mapa { background: var(--cm-purple); color: #fff; }
.btn-remodelacion { background: #B7B0C2; color: #fff; cursor: not-allowed; }

.store-card-group { grid-column: span 1; }

.store-badge-locales {
  background: #FFF3E0;
  color: #B45309;
}

.store-floors-summary {
  font-size: 10px;
  color: var(--cm-muted);
  margin-top: 4px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.btn-toggle-locales {
  width: 100%;
  border: none;
  font-size: 11px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
  background: #EFE5FA;
  color: var(--cm-purple-dark);
}

.store-group-locations {
  border-top: 1px solid var(--cm-line);
  background: #FAF7FD;
}

.store-group-locations.hidden { display: none; }

.store-group-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--cm-line);
}

.store-group-row:last-child { border-bottom: none; }

.store-group-row-info { flex: 1; min-width: 0; }

.store-group-row-name {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.store-group-row-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.btn-ver-mapa-sm {
  border: none;
  font-size: 10px;
  font-weight: 700;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  background: var(--cm-purple);
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;
}

.cm-empty { text-align: center; padding: 20px 10px; }
.cm-empty-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
.cm-empty-copy { color: var(--cm-muted); font-size: 13px; line-height: 1.4; }

.cm-speak-fab {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(180deg, rgba(244,240,248,0) 0%, rgba(244,240,248,0.92) 30%, #F4F0F8 100%);
  pointer-events: none;
}

.cm-speak-btn {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  cursor: pointer;
  pointer-events: auto;
  background: linear-gradient(135deg, var(--cm-purple) 0%, var(--cm-pink) 100%);
  box-shadow: 0 8px 24px rgba(91, 45, 142, 0.3);
}

.cm-speak-btn:active { transform: scale(0.98); }

.map-view {
  position: fixed;
  inset: 0;
  background: var(--cm-surface);
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.map-view.hidden { display: none; }

.map-view-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--cm-purple-dark) 0%, var(--cm-purple) 100%);
  color: #fff;
  gap: 10px;
  flex-wrap: wrap;
}

.map-view-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.btn-map-route {
  border: none;
  background: var(--cm-pink);
  color: #fff;
  padding: 8px 12px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.btn-map-route.hidden { display: none; }

.btn-map-route:disabled,
.btn-map-route.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(255,255,255,0.25);
}

.map-floor-bar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid var(--cm-line);
  -webkit-overflow-scrolling: touch;
}

.map-floor-bar.hidden { display: none; }

.map-floor-btn {
  border: 1px solid var(--cm-line);
  background: #fff;
  color: var(--cm-text);
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  flex: 0 0 auto;
}

.map-floor-btn.active {
  background: var(--cm-purple);
  color: #fff;
  border-color: var(--cm-purple);
}

.btn-back {
  border: none;
  background: rgba(255,255,255,0.18);
  color: #fff;
  padding: 8px 14px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.map-view-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 16px;
  min-width: 0;
}

.map-view-title-text {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.map-view-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
}

.store-detail-panel {
  background: #fff;
  padding: 16px;
  border-bottom: 1px solid var(--cm-line);
}

.store-detail-panel.hidden { display: none; }

.store-detail-header {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 10px;
}

.store-detail-logo.store-logo,
.store-detail-logo.store-initials {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  margin-bottom: 0;
  flex-shrink: 0;
}

.store-detail-name {
  margin: 0 0 6px;
  font-size: 18px;
  font-weight: 800;
  line-height: 1.2;
}

.store-detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.store-detail-desc {
  margin: 0 0 10px;
  font-size: 14px;
  line-height: 1.45;
  color: var(--cm-text);
}

.store-detail-schedule {
  margin: 0;
  font-size: 13px;
  line-height: 1.4;
  color: var(--cm-muted);
}

.map-embed-wrap {
  position: relative;
  min-height: min(52vh, 460px);
  height: min(52vh, 460px);
  flex-shrink: 0;
  background: #fff;
}

#map-iframe,
#mapvx-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  background: #fff;
  min-height: 0;
  flex: none;
}

#mapvx-container.hidden,
#map-iframe.hidden { display: none; }

.map-status {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--cm-muted);
  background: #fff;
  border-bottom: 1px solid var(--cm-line);
}

.map-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  color: var(--cm-muted);
  font-size: 14px;
  background: #fff;
}

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.hidden { display: none !important; }

.cm-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0 4px;
}

.cm-chip {
  border: 1px solid var(--cm-line);
  background: #F6F1FB;
  color: var(--cm-purple-dark);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
}

.cm-chip:active { transform: scale(0.97); }

.store-badge-promo {
  background: #FFE8F3;
  color: #B8005C;
}

.promo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding-bottom: 24px;
}

.promo-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid var(--cm-line);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.promo-card-img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  background: #EFE5FA;
}

.promo-card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }

.promo-brand { font-size: 11px; font-weight: 800; color: var(--cm-purple); }

.promo-title {
  font-size: 12px;
  font-weight: 700;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.promo-validity { font-size: 10px; color: var(--cm-muted); }

.btn-promo-app {
  width: 100%;
  border: none;
  font-size: 11px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
  background: var(--cm-pink);
  color: #fff;
}

.service-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 24px; }

.service-card {
  border: 1px solid var(--cm-line);
  border-radius: 14px;
  padding: 12px;
  background: #fff;
  cursor: pointer;
}

.service-card.expanded .service-desc { -webkit-line-clamp: unset; white-space: normal; }

.service-name { font-size: 15px; font-weight: 800; margin-bottom: 4px; }

.service-loc { font-size: 11px; color: var(--cm-purple); font-weight: 700; margin-bottom: 6px; }

.service-desc {
  font-size: 12px;
  color: var(--cm-muted);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.parking-summary {
  font-size: 14px;
  line-height: 1.5;
  color: var(--cm-text);
  margin-bottom: 12px;
  font-weight: 600;
}

.parking-accordion { display: flex; flex-direction: column; gap: 8px; }

.parking-item {
  border: 1px solid var(--cm-line);
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
}

.parking-item-head {
  width: 100%;
  border: none;
  background: #F6F1FB;
  text-align: left;
  padding: 12px 14px;
  font-size: 14px;
  font-weight: 800;
  color: var(--cm-purple-dark);
  cursor: pointer;
}

.parking-item-body {
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--cm-muted);
  border-top: 1px solid var(--cm-line);
}

.parking-item-body.hidden { display: none; }

.service-card-bathroom {
  border-color: #C9B8E8;
  background: linear-gradient(180deg, #FFF 0%, #F9F5FE 100%);
}

.service-card-top {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 0;
}

.service-card-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.service-card-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.btn-service-map {
  border: none;
  border-radius: 10px;
  background: var(--cm-purple);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 12px;
  cursor: pointer;
  white-space: nowrap;
}

.service-floor-hint {
  font-size: 12px;
  color: var(--cm-muted);
  margin: 0 0 10px;
  line-height: 1.4;
}

.cm-search-landing {
  display: none;
  flex-direction: column;
  gap: 12px;
}

.cm-search-landing.visible {
  display: flex;
}

.cm-search-landing-title {
  margin: 0;
  font-size: 17px;
  font-weight: 800;
  line-height: 1.35;
  color: var(--cm-text);
}

.cm-search-landing-hint {
  margin: 0;
  font-size: 14px;
  color: var(--cm-muted);
  line-height: 1.45;
}

.cm-search-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}

.cm-search-input {
  flex: 1;
  min-width: 0;
  border: 2px solid var(--cm-line);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 16px;
  font-weight: 600;
  color: var(--cm-text);
  background: #fff;
}

.cm-search-input:focus {
  outline: none;
  border-color: var(--cm-purple);
}

.cm-search-btn {
  border: none;
  border-radius: 12px;
  background: var(--cm-purple);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  padding: 12px 18px;
  cursor: pointer;
  white-space: nowrap;
}

.cm-search-voice-hint {
  margin: 0;
  font-size: 13px;
  color: var(--cm-muted);
  text-align: center;
}
</style>
</head>
<body class="cencomall-theme">

<div class="app-shell" id="app-shell">
  <header class="cm-header">
    <h1 class="cm-header-title">Cenco Costanera <span class="test-version-badge" id="mobility-test-version-badge">versión prueba</span></h1>
  </header>

  <section id="survey-strip" class="cm-survey-strip hidden" aria-label="Evaluación de atención">
    <div class="cm-survey-strip-inner" id="survey-strip-inner">
      <div class="cm-survey-strip-text">
        <h2 class="cm-survey-title" id="survey-title">¿Cómo va mi atención?</h2>
        <p class="cm-star-hint" id="survey-hint">1 = muy mala · 5 = excelente</p>
      </div>
      <div class="cm-star-rating" id="survey-stars"></div>

function setSurveyVisible(visible) {

  if (!starsWrap) return;

  starsWrap.innerHTML = [1, 2, 3, 4, 5].map((score) => `
    <button
      class="cm-star-btn"

      data-score="${score}"
      aria-label="${score} estrella${score > 1 ? "s" : ""} — ${STAR_LABELS[score - 1]}"

  starsWrap.querySelectorAll(".cm-star-btn").forEach((btn) => {
    btn.onclick = () => submitEntrySurvey(btn.getAttribute("data-score"), btn);
  });

  setSurveyVisible(true);

function highlightStars(upToScore) {
  document.querySelectorAll(".cm-star-btn").forEach((btn) => {
    const score = Number(btn.getAttribute("data-score"));
    btn.classList.toggle("selected", score <= upToScore);
    btn.classList.toggle("active", score === upToScore);
  });

  const hint = document.getElementById("survey-hint");
  if (hint && upToScore >= 1 && upToScore <= 5)
    hint.textContent = STAR_LABELS[upToScore - 1];
}

function submitEntrySurvey(score, buttonEl) {
  const numericScore = Number(score);
  highlightStars(numericScore);
  if (buttonEl) buttonEl.classList.add("active");

  SimaBridge.send("service_feedback", { score: String(score), phase: "entry" });

  const strip = document.getElementById("survey-strip");
  const inner = document.getElementById("survey-strip-inner");
  if (strip && inner) {
    strip.classList.add("is-thanks");
    inner.innerHTML = `<p class="cm-survey-thanks-msg">${escapeHtml(t("surveyThanks"))}</p>`;
  }

  window.setTimeout(() => {
    if (strip) strip.classList.remove("is-thanks");
    setSurveyVisible(false);
  }, 1200);
}

function decodeBase64Utf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function showSearchError(message) {
  document.getElementById("resultado").innerHTML = `
    <div class="cm-panel fade-in">
      <div class="cm-empty">
        <div class="cm-empty-title">${escapeHtml(t("loadErrorTitle"))}</div>
        <div class="cm-empty-copy">${escapeHtml(message)}</div>
      </div>
    </div>`;
}

function buscarDesdeVoz(raw) {
  if (raw == null) return;
  if (typeof raw === "object") {
    renderIncomingPayload(raw);
    return;
  }

  let input = String(raw).trim();
  if (!input) return;

  if (input.startsWith("base64:")) {
    try { input = decodeBase64Utf8(input.substring(7)); }
    catch (e) {
      showSearchError("Error al leer los datos de la búsqueda.");
      return;
    }
  }

  if (input.startsWith("{") || input.startsWith("[")) {
    try { renderIncomingPayload(JSON.parse(input)); }
    catch (e) { showSearchError("Error al mostrar los resultados."); }
  }
}

function renderIncomingPayload(dataJson) {
  if (!dataJson || !dataJson.type) return;
  switch (dataJson.type) {
    case "market_search":
      renderMarketResults(dataJson);
      break;
    case "promotion_search":
      renderPromotionResults(dataJson);
      break;
    case "services_search":
      renderServicesResults(dataJson);
      break;
    case "parking_info":
      renderParkingInfo(dataJson);
      break;
    default:
      console.warn("Unknown payload type", dataJson.type);
  }
}

function getStoreInitials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function getCencomallSiteOrigin() {
  return String(window.CENCOMALL_SITE_ORIGIN || "https://stg.cencomalls.cl").replace(/\/$/, "");
}

function resolveMediaUrl(url) {
  if (!url) return "";
  const u = String(url).trim();
  if (/^https?:\/\//i.test(u)) return u;
  const origin = getCencomallSiteOrigin();
  return u.startsWith("/") ? origin + u : origin + "/" + u;
}

function resolveStoreLogoUrl(result) {
  if (!result) return "";
  const raw = String(
    result.logoUrl || result.LogoUrl || result.logo || result.brand_logo || ""
  ).trim();
  return resolveMediaUrl(raw);
}

function onStoreLogoError(img) {
  const initials = img.getAttribute("data-initials") || "?";
  const hadDetail = img.classList.contains("store-detail-logo");
  const div = document.createElement("div");
  div.className = hadDetail ? "store-initials store-detail-logo" : "store-initials";
  div.textContent = initials;
  img.replaceWith(div);
}

function renderStoreAvatar(result, detail) {
  const name = result.name || result.brand || "Tienda";
  const initials = getStoreInitials(name);
  const logoUrl = resolveStoreLogoUrl(result);
  const extraClass = detail ? " store-detail-logo" : "";
  if (!logoUrl) {
    return `<div class="store-initials${extraClass}">${escapeHtml(initials)}</div>`;
  }
  return `<img class="store-logo${extraClass}" src="${escapeHtml(logoUrl)}" alt="" loading="lazy" data-initials="${escapeHtml(initials)}" onerror="onStoreLogoError(this)" />`;
}

function formatNivel(floor) {
  if (!floor) return "—";
  const f = String(floor).trim();
  if (f.toUpperCase() === "ALL") return t("allLevels");
  if (/^pb$/i.test(f) || /planta baja/i.test(f)) return t("gf");
  const m = f.match(/(\d+)/);
  if (m) return t("level") + " " + m[1];
  return f;
}

function formatServiceFloors(floors) {
  if (!floors || !floors.length) return "";
  if (floors.includes("ALL")) return t("allLevels");
  return floors.map((f) => formatNivel(f)).join(" · ");
}

function getServiceKind(name) {
  const n = String(name || "").toLowerCase();
  if (n.includes("niños") || n.includes("ninos") || n.includes("mudador"))
    return "kids";
  if (n.includes("baño") || n.includes("bano") || n.includes("wc"))
    return "bathroom";
  return "";
}

function firstCategory(category) {
  if (!category) return "";
  return String(category).split(",")[0].trim();
}

function truncate(text, max) {
  if (!text) return "";
  const clean = String(text).trim();
  return clean.length <= max ? clean : clean.substring(0, max - 1) + "…";
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function summarizeFloors(locations) {
  if (!locations || !locations.length) return "";
  const floors = locations
    .map((loc) => formatNivel(loc.floor))
    .filter((f) => f && f !== "—");
  return [...new Set(floors)].join(" · ");
}

function resolveStore(groupIndex, locationIndex) {
  const result = lastMarketPayload?.results?.[groupIndex];
  if (!result) return null;

  const base = {
    id: result.id,
    name: result.name,
    floor: result.floor,
    category: result.category,
    local: result.local,
    schedule: result.schedule,
    brand: result.brand,
    mall: result.mall,
    logoUrl: result.logoUrl,
    keywords: result.keywords,
    description: result.description,
    available: result.available !== false
  };

  if (
    locationIndex != null
    && result.isGroup
    && result.locations
    && result.locations[locationIndex]
  ) {
    const loc = result.locations[locationIndex];
    return {
      ...base,
      id: loc.id || base.id,
      name: loc.name || base.name,
      floor: loc.floor || base.floor,
      category: loc.category || base.category,
      local: loc.local || base.local,
      schedule: loc.schedule || base.schedule,
      available: loc.available !== false
    };
  }

  return base;
}

function renderStoreDetailPanel(store) {
  const panel = document.getElementById("store-detail-panel");
  if (!panel) return;
  if (!store) {
    panel.classList.add("hidden");
    panel.innerHTML = "";
    return;
  }

  const displayName = store.name || store.brand || t("results");
  const category = firstCategory(store.category);
  const categoryBadge = category
    ? `<span class="store-badge" title="${escapeHtml(store.category)}">${escapeHtml(truncate(category, 24))}</span>`
    : "";
  const floorBadge = store.floor
    ? `<span class="store-badge store-badge-floor">${escapeHtml(formatNivel(store.floor))}</span>`
    : "";
  const localBadge = store.local
    ? `<span class="store-badge" title="${escapeHtml(store.local)}">${escapeHtml(truncate(store.local, 16))}</span>`
    : "";
  const infoText = store.description || store.keywords || "";
  const schedule = store.schedule ? String(store.schedule).trim() : "";

  panel.innerHTML = `
    <div class="store-detail-header">
      ${renderStoreAvatar(store, true)}
      <div class="store-detail-head-text">
        <h2 class="store-detail-name">${escapeHtml(displayName)}</h2>
        <div class="store-detail-meta">${categoryBadge}${floorBadge}${localBadge}</div>
      </div>
    </div>
    ${infoText ? `<p class="store-detail-desc">${escapeHtml(infoText)}</p>` : `<p class="store-detail-desc">${escapeHtml(t("noAdditionalDetail"))}</p>`}
    ${schedule ? `<p class="store-detail-schedule"><strong>${escapeHtml(t("schedule"))}:</strong> ${escapeHtml(schedule)}</p>` : ""}`;
  panel.classList.remove("hidden");
}

function findStoreInMarketPayload(localOrId) {
  const key = String(localOrId || "").trim().toLowerCase();
  if (!key || !lastMarketPayload?.results?.length) return null;

  for (let idx = 0; idx < lastMarketPayload.results.length; idx++) {
    const result = lastMarketPayload.results[idx];
    if (
      String(result.local || "").trim().toLowerCase() === key
      || String(result.id || "").trim().toLowerCase() === key
    ) {
      return resolveStore(idx);
    }
    if (result.locations?.length) {
      for (let locIdx = 0; locIdx < result.locations.length; locIdx++) {
        const loc = result.locations[locIdx];
        if (
          String(loc.local || "").trim().toLowerCase() === key
          || String(loc.id || "").trim().toLowerCase() === key
        ) {
          return resolveStore(idx, locIdx);
        }
      }
    }
  }
  return null;
}

function setMapStatus(text, isError) {

    return;
  }
  status.textContent = text;
  status.classList.remove("hidden");
  status.style.color = isError ? "#B42318" : "var(--cm-muted)";
}

function logMap(level, message, data) {
  const prefix = "[mobility/map]";
  const line = data !== undefined ? `${prefix} ${message} ${JSON.stringify(data)}` : `${prefix} ${message}`;
  if (level === "error") console.error(line);
  else if (level === "warn") console.warn(line);
  else console.log(line);
  if (typeof SimaBridge !== "undefined") {
    SimaBridge.send("mapvx_log", {
      level: level || "info",
      message: prefix + " " + message,
      data: data ? String(JSON.stringify(data)).slice(0, 500) : ""
    });
  }
}

function logMapVxConfig(context) {
  const cfg = window.MAPVX_CONFIG || {};
  const summary = typeof MapVxBridge !== "undefined" && MapVxBridge.configSummary
    ? MapVxBridge.configSummary(cfg)
    : {
        hasApiKey: !!(cfg.apiKey && cfg.apiKey.length),
        apiKeyLen: cfg.apiKey ? cfg.apiKey.length : 0,
        parentPlace: cfg.parentPlace || null,
        institutionId: cfg.institutionId || null
      };
  logMap("info", context + " MAPVX_CONFIG", summary);
  logMap("info", context + " sdkLoaded", {
    MapVX: typeof MapVX !== "undefined",
    MapVxBridge: typeof MapVxBridge !== "undefined",
    configured: typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured()
  });
}

function useMapVxSdk() {
  const ok = typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured();
  if (!ok) {
    logMap("warn", "useMapVxSdk=false", {
      bridge: typeof MapVxBridge !== "undefined",
      configured: typeof MapVxBridge !== "undefined" ? MapVxBridge.isConfigured() : false,
      mapUrl: MAP_SERVICE_BASE_URL || window.MALL_MAP_BASE_URL || ""
    });
  }
  return ok;
}

function resetMapControls() {
  const floorBar = document.getElementById("map-floor-bar");
  const routeBtn = document.getElementById("map-route-btn");
  if (floorBar) {
    floorBar.classList.add("hidden");
    floorBar.innerHTML = "";
  }
  if (routeBtn) {
    routeBtn.classList.add("hidden");
    routeBtn.disabled = false;
    routeBtn.classList.remove("disabled");
    routeBtn.textContent = t("viewRoute");
  }
}

function updateMapRouteButton(result) {
  const btn = document.getElementById("map-route-btn");
  if (!btn) return;
  const canRoute = typeof MapVxBridge !== "undefined"
    && MapVxBridge.hasRouteOrigin
    && MapVxBridge.hasRouteOrigin();
  btn.classList.remove("hidden");
  if (!canRoute) {
    btn.textContent = t("routeNeedsTotem");
    btn.classList.add("disabled");
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  btn.classList.remove("disabled");
  const active = !!(result && (result.routeActive || result.routeStarted));
  btn.textContent = active ? t("clearRoute") : t("viewRoute");
}

function renderMapFloorBar(activeFloorKey) {
  const bar = document.getElementById("map-floor-bar");
  if (!bar || typeof MapVxBridge === "undefined" || !MapVxBridge.getMapFloors) return;
  const floors = MapVxBridge.getMapFloors() || [];
  if (!floors.length) {
    bar.classList.add("hidden");
    bar.innerHTML = "";
    return;
  }
  bar.classList.remove("hidden");
  bar.innerHTML = floors.map(function (f) {
    const active = f.key === activeFloorKey ? " active" : "";
    return `<button type="button" class="map-floor-btn${active}" data-floor-key="${escapeHtml(f.key)}" role="tab" aria-selected="${f.key === activeFloorKey}">${escapeHtml(f.label)}</button>`;
  }).join("");
  bar.querySelectorAll(".map-floor-btn").forEach(function (btn) {
    btn.onclick = function () { onMapFloorSelect(btn.getAttribute("data-floor-key")); };
  });
}

async function onMapFloorSelect(floorKey) {
  if (!floorKey || typeof MapVxBridge === "undefined" || !MapVxBridge.switchFloor) return;
  try {
    await MapVxBridge.switchFloor(floorKey);
    renderMapFloorBar(floorKey);
  } catch (e) {
    logMap("error", "onMapFloorSelect failed", { floorKey, message: e.message || String(e) });
  }
}

async function onMapRouteToggle() {
  const btn = document.getElementById("map-route-btn");
  if (!btn || btn.disabled || typeof MapVxBridge === "undefined" || !MapVxBridge.toggleRouteToTarget) return;
  try {
    const state = await MapVxBridge.toggleRouteToTarget();
    btn.textContent = state.active ? t("clearRoute") : t("viewRoute");
    const session = MapVxBridge.getMapSession && MapVxBridge.getMapSession();
    const title = session && session.result ? session.result.title : "";
    setMapStatus(title + (state.active ? " · " + t("routeActive") : ""));
  } catch (e) {
    setMapStatus(t("routeError") + ": " + (e.message || e));
    logMap("error", "onMapRouteToggle failed", { message: e.message || String(e) });
  }
}

function setupMapControls(result) {
  updateMapRouteButton(result);
  const activeFloor = result && result.floorId ? result.floorId : null;
  renderMapFloorBar(activeFloor);
  const routeBtn = document.getElementById("map-route-btn");
  if (routeBtn && !routeBtn._bound) {
    routeBtn._bound = true;
    routeBtn.onclick = onMapRouteToggle;
  }
}

async function openPoiMapViaMapVx({ poiType, id, floor, mall, name, local, mode }) {
  const container = document.getElementById("mapvx-container");
  const iframe = document.getElementById("map-iframe");
  const placeholder = document.getElementById("map-placeholder");

  logMap("info", "openPoiMapViaMapVx start", { poiType, id, floor, mall, name, local, mode });
  logMapVxConfig("openPoiMapViaMapVx");

  iframe.classList.add("hidden");
  iframe.src = "";
  placeholder.classList.add("hidden");
  container.classList.remove("hidden");
  if (typeof MapVxBridge !== "undefined" && MapVxBridge.destroyMap) {
    MapVxBridge.destroyMap();
  }
  container.innerHTML = "";
  resetMapControls();
  setMapStatus(t("mapLoading") || "Cargando mapa…");

  try {
    const showFn = mode === "navigation" && MapVxBridge.showRouteTo
      ? MapVxBridge.showRouteTo
      : MapVxBridge.showPlace;
    logMap("info", "calling MapVxBridge", { fn: showFn.name || "showPlace" });
    const result = await showFn(container, { id, name, floor, local, mall, poiType });
    const detail = result.clientId
      ? "clientId=" + result.clientId
      : "mapvxId=" + result.mapvxId;
    let statusLine = (result.title || name || "") + " · " + result.resolvedBy + " · " + detail;
    if (result.routeSkipped) {
      statusLine += " · " + t("routeNeedsTotem");
    } else if (result.routeActive || result.routeStarted) {
      statusLine += " · " + t("routeActive");
    }
    setMapStatus(statusLine);
    setupMapControls(result);
    logMap("info", "openPoiMapViaMapVx success", result);
    window.__mapVxLastLog = { ts: Date.now(), phase: "success", result: result };
  } catch (e) {
    logMap("error", "openPoiMapViaMapVx failed", {
      message: e.message || String(e),
      attempts: e.attempts || null
    });
    window.__mapVxLastLog = {
      ts: Date.now(),
      phase: "error",
      message: e.message || String(e),
      attempts: e.attempts || null
    };
    container.classList.add("hidden");
    MapVxBridge.destroyMap();
    placeholder.classList.remove("hidden");
    const attemptsHtml = e.attempts && e.attempts.length
      ? `<br><small>${escapeHtml(JSON.stringify(e.attempts))}</small>`
      : "";
    placeholder.innerHTML =
      `<div><strong>${escapeHtml(t("mapError") || "No se pudo cargar el mapa")}</strong><br><br>` +
      `${escapeHtml(name || "")}<br>` +
      `${escapeHtml(String(e.message || e))}` +
      attemptsHtml +
      `</div>`;
    setMapStatus("");
  }
}

function openPoiMapViaIframe({ poiType, id, floor, mall, name, local }) {
  logMap("warn", "openPoiMapViaIframe fallback (MapVX not configured or unavailable)", {
    poiType, id, floor, name
  });
  const iframe = document.getElementById("map-iframe");
  const container = document.getElementById("mapvx-container");
  const placeholder = document.getElementById("map-placeholder");
  const params = new URLSearchParams();
  if (mall) params.set("mall", mall);

  if (poiType === "service") {
    if (id) params.set("serviceId", id);
    if (name) params.set("serviceName", name);
  } else {
    if (id) params.set("storeId", id);
    if (floor) params.set("floor", floor);
    if (local) params.set("local", local);
    if (name) params.set("storeName", name);
  }
  if (floor) params.set("floor", floor);

  const mapUrl = MAP_SERVICE_BASE_URL || window.MALL_MAP_BASE_URL || "";
  container.classList.add("hidden");
  if (mapUrl) {
    const fullUrl = mapUrl + (mapUrl.includes("?") ? "&" : "?") + params.toString();
    logMap("info", "iframe map URL", { url: fullUrl });
    iframe.src = fullUrl;
    iframe.classList.remove("hidden");
    placeholder.classList.add("hidden");
    setMapStatus("");
  } else {
    iframe.src = "";
    iframe.classList.add("hidden");
    placeholder.classList.remove("hidden");
    placeholder.innerHTML =
      `<div><strong>${escapeHtml(t("mapComingSoon"))}</strong><br><br>` +
      `${escapeHtml(name || "")}<br>` +
      `${floor ? `${escapeHtml(t("level"))}: ${escapeHtml(formatNivel(floor))}` : ""}</div>`;
    setMapStatus("");
  }
}

function storeMapKey(store) {
  if (!store) return "";
  const local = store.local != null ? String(store.local).trim() : "";
  const id = store.id != null ? String(store.id).trim() : "";
  return local || id;
}

function openPoiMap({ poiType, id, floor, mall, name, local, mode, storeDetail }) {
  const mapLocal = (local != null && String(local).trim()) || (id != null && String(id).trim()) || "";
  logMap("info", "openPoiMap called", { poiType, id, floor, mall, name, local: mapLocal, mode });

  if (!mapLocal) {
    logMap("error", "openPoiMap aborted: missing local/id", { name, poiType });
    return;
  }

  const mapTitleText = document.getElementById("map-view-title-text");
  if (mapTitleText) mapTitleText.textContent = name || t("map");
  document.querySelector(".cm-body").style.display = "none";
  document.querySelector(".cm-speak-fab").style.display = "none";
  document.getElementById("map-view").classList.remove("hidden");

  if (poiType === "store" && storeDetail) {
    renderStoreDetailPanel(storeDetail);
  } else {
    hideStoreDetailPanel();
  }

  const mapOptions = {
    poiType,
    id: mapLocal,
    floor,
    mall,
    name,
    local: mapLocal,
    mode
  };

  const doOpen = function() {
    if (useMapVxSdk()) {
      openPoiMapViaMapVx(mapOptions);
    } else {
      logMap("warn", "MapVX not ready after wait; iframe/placeholder fallback", mapOptions);
      openPoiMapViaIframe(mapOptions);
    }
  };

  waitForMapVxReady(doOpen);

  const eventType = poiType === "service" ? "service_map_opened" : "store_map_opened";
  SimaBridge.send(eventType, {
    id: mapLocal,
    text: name || "",
    destination: formatNivel(floor)
  });
}

function renderTestVersionBadges() {
  const label = "prueba " + MAPVX_TEST_VERSION;
  const headerBadge = document.getElementById("mobility-test-version-badge");
  const mapBadge = document.getElementById("map-view-version-badge");
  if (headerBadge) headerBadge.textContent = label;
  if (mapBadge) mapBadge.textContent = label;
}

window.pushNavigationFromUnity = function(data) {
  try {
    const payload = typeof data === "string" ? JSON.parse(data) : data;
    logMap("info", "pushNavigationFromUnity", payload);
    const mapKey = payload.local || payload.placeId || payload.id;
    const storeDetail = findStoreInMarketPayload(mapKey) || {
      name: payload.name,
      floor: payload.floor,
      mall: payload.mall,
      local: mapKey,
      id: payload.id
    };
    openPoiMap({
      poiType: "store",
      id: mapKey,
      floor: payload.floor,
      mall: payload.mall,
      name: payload.name,
      local: mapKey,
      mode: "navigation",
      storeDetail
    });
  } catch (e) {
    logMap("error", "pushNavigationFromUnity failed", { message: e.message });
  }
};

function waitForMapVxReady(fn, attempt) {
  attempt = attempt || 0;
  try {
    if (typeof MapVxBridge !== "undefined" && MapVxBridge.isConfigured && MapVxBridge.isConfigured()) {
      fn();
      return;
    }
  } catch (e) { /* retry */ }
  if (attempt > 150) {
    logMap("error", "waitForMapVxReady timeout", {
      MapVxBridge: typeof MapVxBridge,
      MapVX: typeof MapVX,
      hasCfg: !!(window.MAPVX_CONFIG && window.MAPVX_CONFIG.apiKey)
    });
    try { fn(); } catch (e2) { logMap("error", "waitForMapVxReady fallback failed", { message: e2.message }); }
    return;
  }
  setTimeout(function () { waitForMapVxReady(fn, attempt + 1); }, 100);
}

function openStoreMap(groupIndex, locationIndex) {
  const store = resolveStore(groupIndex, locationIndex);
  const mapKey = storeMapKey(store);
  logMap("info", "openStoreMap", { groupIndex, locationIndex, store, mapKey });
  if (!store || store.available === false) {
    logMap("warn", "openStoreMap skipped", { reason: !store ? "no store" : "unavailable" });
    return;
  }
  if (!mapKey) {
    logMap("error", "openStoreMap aborted: no local/id on store", { name: store.name });
    return;
  }

  openPoiMap({
    poiType: "store",
    id: mapKey,
    floor: store.floor,
    mall: store.mall,
    name: store.name,
    local: mapKey,
    mode: "place",
    storeDetail: store
  });
}

function openServiceMap(idx) {
  const svc = lastServicesPayload?.results?.[idx];
  if (!svc) return;

  const normalized = normalizeServiceResult(svc);
  const floor = normalized.floors?.find((f) => f !== "ALL") || normalized.floors?.[0] || "";

  openPoiMap({
    poiType: "service",
    id: normalized.id,
    floor: floor === "ALL" ? "" : floor,
    mall: normalized.mall || lastServicesPayload?.mall,
    name: normalized.name,
    mode: "place"
  });
}

function closeMapView() {
  if (typeof MapVxBridge !== "undefined") {
    if (MapVxBridge.clearActiveRoute) MapVxBridge.clearActiveRoute();
    MapVxBridge.destroyMap();
  }
  resetMapControls();
  hideStoreDetailPanel();
  document.getElementById("map-view").classList.add("hidden");
  document.getElementById("map-iframe").src = "";
  document.getElementById("map-iframe").classList.add("hidden");
  document.getElementById("mapvx-container").classList.add("hidden");
  document.getElementById("mapvx-container").innerHTML = "";
  document.getElementById("map-placeholder").classList.add("hidden");
  setMapStatus("");
  document.querySelector(".cm-body").style.display = "";
  document.querySelector(".cm-speak-fab").style.display = "";
}

function startVoiceInput() {
  SimaBridge.send("start_stt", {});
}
</script>
