<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>SIMA Vuelos</title>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />

<link rel="stylesheet" href="../shared/app.css" />
<script src="../shared/bridge.js"></script>

<style>
  :root {
    --sima-blue: #1769ff;
    --sima-purple: #7b2cff;
    --sima-bg: #f4f7fb;
    --sima-border: #d8e0ec;
    --sima-text: #0f172a;
    --sima-muted: #64748b;
  }

  .search-box {
    width: 100%;
    border: 1px solid var(--sima-border);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
    margin-bottom: 10px;
    background: #fff;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tab-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 9px 8px;
    font-size: 13px;
    font-weight: 800;
    background: #eef3fa;
    color: #26364a;
  }

  .tab-btn.active {
    background: var(--sima-blue);
    color: white;
  }

  .summary {
    font-size: 12px;
    color: var(--sima-muted);
    margin-bottom: 8px;
    line-height: 1.35;
  }

  .flights-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    max-height: 54vh;
    overflow-y: auto;
    padding-right: 4px;
  }

  .flight-card {
    padding: 11px;
    border-radius: 14px;
    background: var(--sima-bg);
    border-left: 5px solid #cbd7e6;
    box-sizing: border-box;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .flight-card.departure { border-left-color: var(--sima-blue); }
  .flight-card.arrival { border-left-color: var(--sima-purple); }
  .flight-card.highlight { background: #e8f2ff; transform: scale(1.01); }

  .flight-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .flight-code {
    font-size: 15px;
    font-weight: 900;
    color: var(--sima-text);
  }

  .flight-time {
    font-size: 17px;
    font-weight: 900;
    color: #111827;
    white-space: nowrap;
  }

  .flight-route {
    font-size: 14px;
    margin-top: 3px;
    color: #334155;
    font-weight: 700;
  }

  .flight-meta {
    margin-top: 7px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .pill {
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 999px;
    background: #e8edf5;
    color: #334155;
    font-weight: 800;
  }

  .pill.status { background: #e8f2ff; color: var(--sima-blue); }
  .pill.arrival-status { background: #f0e9ff; color: var(--sima-purple); }

  .empty {
    padding: 16px;
    border-radius: 14px;
    background: #f8fafc;
    text-align: center;
    font-size: 14px;
    color: var(--sima-muted);
  }

  .actions { margin-top: 10px; }

  @media (max-width: 360px) {
    .title { font-size: 18px; }
    .subtitle, .summary { font-size: 12px; }
    .flight-card { padding: 10px; }
    .flight-code { font-size: 14px; }
    .flight-time { font-size: 16px; }
    .flight-route { font-size: 13px; }
    .btn { font-size: 12px; padding: 8px; }
  }
</style>
</head>

<body>
<div class="app-shell">
  <div class="header">
    <div class="brand">SIMA Vuelos</div>
    <div class="status-chip" id="statusChip">Demo local</div>
  </div>

  <div class="card">
    <div class="title">Busca tu vuelo</div>
    <div class="subtitle">Aeropuerto La Serena · LSC</div>

    <input id="searchInput" class="search-box" type="text" placeholder="Buscar vuelo, ciudad, hora o aerolínea" oninput="onSearchInput()" />

    <div class="tabs">
      <button class="tab-btn active" id="tabAll" onclick="setType('all')">Todos</button>
      <button class="tab-btn" id="tabDepartures" onclick="setType('departure')">Salidas</button>
      <button class="tab-btn" id="tabArrivals" onclick="setType('arrival')">Llegadas</button>
    </div>

    <div class="summary" id="summary">Cargando información de vuelos...</div>
    <div class="flights-list" id="flightsList"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="speakCurrentSummary()">Resumen</button>
      <button class="btn btn-secondary" onclick="clearFilters()">Limpiar</button>
      <button class="btn btn-secondary" onclick="closeView()">Cerrar</button>
    </div>
  </div>
</div>

let allFlightsData = { arrivals: [], departures: [], results: [] };
let currentType = "all";
let currentQuery = "";

function safeBridgeSpeak(text) {
  try { if (window.SimaBridge && typeof SimaBridge.speak === "function") SimaBridge.speak(text); } catch (e) { console.log(e); }
}
function safeBridgeReady(service) {
  try { if (window.SimaBridge && typeof SimaBridge.ready === "function") SimaBridge.ready(service); } catch (e) { console.log(e); }
}
function safeBridgeClose() {
  try { if (window.SimaBridge && typeof SimaBridge.requestClose === "function") { SimaBridge.requestClose(); return; } } catch (e) { console.log(e); }
}
function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name) || "";
}
function normalizeText(value) {
  return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}
function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function setType(type) {
  currentType = type;
  document.getElementById("tabAll").classList.toggle("active", type === "all");
  document.getElementById("tabDepartures").classList.toggle("active", type === "departure");
  document.getElementById("tabArrivals").classList.toggle("active", type === "arrival");
  renderFlights();
}
function onSearchInput() {
  currentQuery = document.getElementById("searchInput").value;
  renderFlights();
}
function loadLocalFlights(speak = false) {
  allFlightsData = {
    ...LOCAL_FLIGHTS_DATA,
    arrivals: LOCAL_FLIGHTS_DATA.arrivals || [],
    departures: LOCAL_FLIGHTS_DATA.departures || [],
    results: [...(LOCAL_FLIGHTS_DATA.departures || []), ...(LOCAL_FLIGHTS_DATA.arrivals || [])]
  };
  document.getElementById("statusChip").innerText = "Demo local";
  renderFlights();
  if (speak) safeBridgeSpeak("Información de vuelos cargada.");
}
function getVisibleFlights() {
  let flights = [];
  if (currentType === "departure") flights = allFlightsData.departures || [];
  else if (currentType === "arrival") flights = allFlightsData.arrivals || [];
  else flights = [...(allFlightsData.departures || []), ...(allFlightsData.arrivals || [])];

  const q = normalizeText(currentQuery);
  if (q) {
    flights = flights.filter(f => {
      const searchable = normalizeText([
        f.airline, f.aerolinea, f.flight, f.vuelo, f.flightCode,
        f.origin, f.origen, f.destination, f.destino, f.date, f.fecha,
        f.time, f.departureTime, f.salida, f.arrivalTime, f.llegada,
        f.boardingTime, f.embarque, f.gate, f.puerta,
        f.baggageBelt, f.cinta, f.status, f.estado
      ].join(" "));
      return searchable.includes(q);
    });
  }
  return flights.sort((a, b) => {
    const aKey = `${a.date || a.fecha || ""} ${a.time || a.salida || a.llegada || ""}`;
    const bKey = `${b.date || b.fecha || ""} ${b.time || b.salida || b.llegada || ""}`;
    return aKey.localeCompare(bKey);
  });
}
function renderFlights() {
  const flights = getVisibleFlights();
  const list = document.getElementById("flightsList");
  const summary = document.getElementById("summary");
  const updated = allFlightsData.updatedAt ? new Date(allFlightsData.updatedAt).toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" }) : "--:--";
  const depCount = allFlightsData.departures?.length || 0;
  const arrCount = allFlightsData.arrivals?.length || 0;
  summary.innerText = `${flights.length} resultados · ${depCount} salidas · ${arrCount} llegadas · Demo ${updated}`;
  if (!flights.length) { list.innerHTML = `<div class="empty">No encontré vuelos con ese filtro.</div>`; return; }
  list.innerHTML = flights.map((flight, idx) => renderFlightCard(flight, idx === 0 && currentQuery)).join("");
  if (currentQuery && flights.length) {
    setTimeout(() => {
      const first = document.querySelector(".flight-card");
      if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 100);
  }
}
function renderFlightCard(f, shouldHighlight) {
  const isDeparture = f.type === "departure";
  const typeLabel = isDeparture ? "Salida" : "Llegada";
  const airline = f.airline || f.aerolinea || "";
  const flight = f.flight || f.vuelo || "";
  const destination = f.destination || f.destino || "";
  const origin = f.origin || f.origen || "";
  const route = isDeparture ? `Destino: ${destination || "-"}` : `Origen: ${origin || "-"}`;
  const mainTime = isDeparture ? (f.departureTime || f.salida || f.time || "-") : (f.arrivalTime || f.llegada || f.time || "-");
  const gateOrBelt = isDeparture ? `Puerta ${f.gate || f.puerta || "-"}` : `Cinta ${f.baggageBelt || f.cinta || "-"}`;
  const boarding = isDeparture && (f.boardingTime || f.embarque) ? `<span class="pill">Embarque ${escapeHtml(f.boardingTime || f.embarque)}</span>` : "";
  const statusClass = isDeparture ? "status" : "status arrival-status";
  return `
    <div class="flight-card ${isDeparture ? "departure" : "arrival"} ${shouldHighlight ? "highlight" : ""}">
      <div class="flight-top">
        <div>
          <div class="flight-code">${escapeHtml(airline)} ${escapeHtml(flight)}</div>
          <div class="flight-route">${escapeHtml(route)}</div>
        </div>
        <div class="flight-time">${escapeHtml(mainTime)}</div>
      </div>
      <div class="flight-meta">
        <span class="pill">${typeLabel}</span>
        <span class="pill">${escapeHtml(gateOrBelt)}</span>
        ${boarding}
        <span class="pill ${statusClass}">${escapeHtml(f.status || f.estado || "Sin estado")}</span>
      </div>
    </div>`;
}
function speakCurrentSummary() {
  const flights = getVisibleFlights();
  if (!flights.length) { safeBridgeSpeak("No encontré vuelos con ese filtro."); return; }
  const first = flights[0];
  if (flights.length === 1) {
    if (first.type === "departure") safeBridgeSpeak(`Encontré un vuelo. ${first.airline} ${first.flight} sale hacia ${first.destination} a las ${first.departureTime || first.time}. Estado ${first.status}.`);
    else safeBridgeSpeak(`Encontré un vuelo. ${first.airline} ${first.flight} llega desde ${first.origin} a las ${first.arrivalTime || first.time}. Estado ${first.status}.`);
    return;
  }
  const sample = flights.slice(0, 3).map(f => {
    if (f.type === "departure") return `${f.airline} ${f.flight} hacia ${f.destination} a las ${f.departureTime || f.time}`;
    return `${f.airline} ${f.flight} desde ${f.origin} a las ${f.arrivalTime || f.time}`;
  }).join("; ");
  // safeBridgeSpeak(`Encontré ${flights.length} vuelos. Los primeros son: ${sample}.`);
}
function clearFilters() {
  currentQuery = "";
  currentType = "all";
  document.getElementById("searchInput").value = "";
  setType("all");
  safeBridgeSpeak("Filtros limpiados. Te muestro todos los vuelos disponibles.");
}
function applyInitialParams() {
  const q = getQueryParam("q") || getQueryParam("query");
  const type = getQueryParam("type");
  if (q) { currentQuery = q; document.getElementById("searchInput").value = q; }
  if (type === "departure" || type === "departures" || type === "salidas") setType("departure");
  else if (type === "arrival" || type === "arrivals" || type === "llegadas") setType("arrival");
  else setType("all");
}
function handleUnityData(data) {
  try {
    if (typeof data === "string") data = JSON.parse(data);
    if (data.extra && typeof data.extra === "string") {
      try { data = { ...data, ...JSON.parse(data.extra) }; } catch (_) {}
    }
    if (data.query) { currentQuery = data.query; document.getElementById("searchInput").value = data.query; }
    if (data.destination && !currentQuery) { currentQuery = data.destination; document.getElementById("searchInput").value = data.destination; }
    if (data.type) {
      if (data.type === "departure" || data.type === "departures") currentType = "departure";
      else if (data.type === "arrival" || data.type === "arrivals") currentType = "arrival";
      else currentType = "all";
    }
    setType(currentType);
    renderFlights();
    setTimeout(() => speakCurrentSummary(), 300);
  } catch (e) { console.error("handleUnityData error", e); }
}
function closeView() { safeBridgeClose(); }
window.onload = () => {
  safeBridgeReady("flights");
  applyInitialParams();
  loadLocalFlights(false);
  // if (currentQuery) setTimeout(() => speakCurrentSummary(), 500);
};
</script>
