<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>On Tour — Cenco Costanera</title>
  <link rel="stylesheet" href="../shared/app.css" />
  <script src="../shared/qrcode.min.js"></script>
  <script src="../shared/locale.js"></script>
  <script src="../shared/bridge.js"></script>
  <style>
    :root {
      --cm-purple: #5B2D8E;
      --cm-purple-dark: #3D1D5C;
      --cm-surface: #F4F0F8;
      --cm-text: #1E1630;
      --cm-muted: #6B6280;
    }

    body { background: var(--cm-surface); color: var(--cm-text); }

    .app-shell {
      background: var(--cm-surface);
      gap: 16px;
      padding: 20px 18px 28px;
    }

    .cm-header {
      background: linear-gradient(135deg, var(--cm-purple-dark) 0%, var(--cm-purple) 100%);
      color: #fff;
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 8px 24px rgba(61, 29, 92, 0.18);
    }

    .cm-header h1 { margin: 0 0 6px; font-size: 24px; font-weight: 800; }
    .cm-header p { margin: 0; font-size: 15px; opacity: 0.92; line-height: 1.4; }

    .card {
      border: 1px solid #E7DFF0;
      box-shadow: 0 8px 24px rgba(61, 29, 92, 0.08);
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bullet-list {
      margin: 0;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 15px;
      line-height: 1.5;
    }

    .qr-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 18px 16px;
      border-radius: 14px;
      background: #FAF7FD;
      border: 1px solid #E7DFF0;
    }

    .qr-box .qr-container img,
    .qr-box .qr-container canvas {
      width: 220px;
      height: 220px;
      border-radius: 12px;
      background: #fff;
      object-fit: contain;
    }

    .qr-caption {
      margin: 0;
      width: 100%;
      max-width: none;
      padding: 0 4px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
      color: var(--cm-text);
      text-align: left;
    }

    .btn-primary, .btn-secondary {
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary {
      background: var(--cm-purple);
      color: #fff;
      border: none;
    }

    .btn-secondary {
      background: #fff;
      color: var(--cm-purple);
      border: 2px solid var(--cm-purple);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="cm-header">
      <h1 id="page-title">On Tour</h1>
      <p id="page-subtitle">Tu pasaporte a una experiencia exclusiva en Cenco Costanera</p>
    </header>

    <div class="card">
      <div class="title" id="section-title">¿De visita en Santiago?</div>
      <div class="subtitle" id="section-lead">
        Programa exclusivo para turistas con descuentos, promociones y panoramas únicos.
      </div>

      <ul class="bullet-list" id="benefits-list"></ul>

      <div class="qr-box">
        <p class="qr-caption" id="qr-hint"></p>
        <div id="qr-container" class="qr-container"></div>
      </div>
    </div>
  </div>

  <script>
    let ontourUrl = "https://www.cencomalls.cl/costanera/Ontour-es";
    let currentLocale = "es";

    const I18N = {
      es: {
        pageTitle: "On Tour",
        pageSubtitle: "Tu pasaporte a una experiencia exclusiva en Cenco Costanera",
        sectionTitle: "¿De visita en Santiago?",
        sectionLead: "Programa exclusivo para turistas con descuentos, promociones y panoramas únicos.",
        benefits: [],
        qrHint: "Escanea el código QR para activar tu tarjeta o para registrarte en el programa On Tour.",
        close: "Cerrar",
        speakIntro: "Escanea el código QR para activar tu tarjeta o para registrarte en el programa On Tour."
      },
      en: {
        pageTitle: "On Tour",
        pageSubtitle: "Your passport to an exclusive experience at Cenco Costanera",
        sectionTitle: "Visiting Santiago?",
        sectionLead: "Exclusive tourist program with discounts, promotions and unique experiences.",
        benefits: [],
        qrHint: "Scan the QR code to activate your card or register for the On Tour program.",
        close: "Close",
        speakIntro: "Scan the QR code to activate your card or register for the On Tour program."
      },
      pt: {
        pageTitle: "On Tour",
        pageSubtitle: "Seu passaporte para uma experiência exclusiva no Cenco Costanera",
        sectionTitle: "Visitando Santiago?",
        sectionLead: "Programa exclusivo para turistas com descontos, promoções e experiências únicas.",
        benefits: [],
        qrHint: "Escaneie o código QR para ativar seu cartão ou cadastrar-se no programa On Tour.",
        close: "Fechar",
        speakIntro: "Escaneie o código QR para ativar seu cartão ou cadastrar-se no programa On Tour."
      }
    };

    function applyLocale() {
      currentLocale = SimaLocale.readLocaleFromPage();
      document.documentElement.lang = currentLocale;

      document.getElementById("page-title").textContent = SimaLocale.t(I18N, "pageTitle", currentLocale);
      document.getElementById("page-subtitle").textContent = SimaLocale.t(I18N, "pageSubtitle", currentLocale);
      document.getElementById("section-title").textContent = SimaLocale.t(I18N, "sectionTitle", currentLocale);
      document.getElementById("section-lead").textContent = SimaLocale.t(I18N, "sectionLead", currentLocale);
      document.getElementById("qr-hint").textContent = SimaLocale.t(I18N, "qrHint", currentLocale);

      const pack = SimaLocale.pickPack(I18N, currentLocale);
      const benefits = pack.benefits || [];
      const listEl = document.getElementById("benefits-list");
      listEl.innerHTML = benefits.map((item) => `<li>${item}</li>`).join("");
      listEl.style.display = benefits.length ? "" : "none";
    }

    let introSpoken = false;

    function isLocalPreview() {
      var host = String(window.location.hostname || "").toLowerCase();
      return host === "localhost" || host === "127.0.0.1";
    }

    function speakPageIntro() {
      if (introSpoken) return;
      if (typeof SimaBridge === "undefined" || typeof SimaBridge.speak !== "function") return;
      introSpoken = true;
      SimaBridge.speak(SimaLocale.t(I18N, "speakIntro", currentLocale));
    }

    function renderQrImage(base64) {
      var box = document.getElementById("qr-container");
      if (!box) return;
      box.innerHTML = "";

      if (base64) {
        var img = document.createElement("img");
        img.id = "qr-image";
        img.alt = "QR On Tour";
        img.src = "data:image/png;base64," + base64;
        box.appendChild(img);
        SimaBridge.send("qr_displayed", { id: "ontour", url: ontourUrl });
        return;
      }

      if (isLocalPreview() && typeof QRCode !== "undefined" && ontourUrl) {
        new QRCode(box, {
          text: ontourUrl,
          width: 220,
          height: 220,
          colorDark: "#1a1a1a",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
    }

    window.handleUnityData = function(data) {
      if (!data) return;
      if (typeof data === "string") {
        try { data = JSON.parse(data); } catch (e) { return; }
      }

      if (data.url) ontourUrl = data.url;
      applyLocale();
      renderQrImage(data.qrImage || "");
      speakPageIntro();
    };

    SimaLocale.bindPageLocale(applyLocale);

    window.addEventListener("load", () => {
      applyLocale();
      renderQrImage("");
      SimaBridge.ready("ontour");
      speakPageIntro();
    });
  </script>
</body>
</html>
