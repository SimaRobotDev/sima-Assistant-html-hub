<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>SIMA Taxi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .modal {
      width: 420px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      border: 2px solid #2d1f5e;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .back {
      font-size: 22px;
      cursor: pointer;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: #2d1f5e;
    }

    .subtitle {
      margin: 12px 0;
      color: #666;
      font-size: 16px;
    }

    .progress-bar {
      height: 10px;
      background: #e6e6e6;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00a8e8, #0091d5);
      transition: width 0.4s ease;
    }

    .driver-card {
      background: #f2f2f2;
      border-radius: 16px;
      padding: 16px;
      margin-top: 10px;
    }

    .driver-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .driver-info {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      color: #2d1f5e;
    }

    .btn-primary {
      margin-top: 24px;
      width: 100%;
      background: #2d1f5e;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-size: 18px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>

  <script src="../shared/locale.js"></script>
  <script src="../shared/bridge.js"></script>
</head>

<body>

  <div class="modal">
    <div class="header">
      <div class="back" onclick="closeView()">←</div>
      <div class="title" id="pageTitle">Reserva de taxi</div>
    </div>

    <div class="subtitle" id="pageSubtitle">Buscando disponibilidad</div>

    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>

 <div id="driverCard" class="driver-card hidden">
  <div id="driverName" class="driver-name">Camila S.</div>
  <div id="etaInfo" class="driver-info">Tiempo estimado: 4 minutos</div>
  <div id="plateInfo" class="driver-info">Patente: CJXL52</div>

  <div class="location">
    <span id="locationText">Dirígete al PISO -2</span>
  </div>
</div>



<div id="successPanel" class="driver-card hidden" style="text-align:center">
  <div id="successTitle" style="font-size:22px; font-weight:700; color:#2d1f5e; margin-bottom:10px;">
    ✅ Taxi solicitado
  </div>

  <div id="successHint" style="font-size:16px; color:#555; margin-bottom:12px;">
    📱 Escanea el QR para continuar en tu teléfono
  </div>

  <div id="ticketIdText" style="font-size:14px; color:#888;">
  </div>
</div>


    <button id="confirmBtn" class="btn-primary hidden" onclick="confirmTaxi()">
      Listo
    </button>
  </div>

  <script>
    let ticketId = "";
    let taxiLocale = SimaLocale.readLocaleFromPage();
    let lastEta = 4;
    let lastPlate = "CJXL52";
    let lastDriver = "Camila S.";

    const TAXI_I18N = {
      es: {
        pageTitle: "Reserva de taxi",
        pageSubtitle: "Buscando disponibilidad",
        eta: "Tiempo estimado: {n} minutos",
        plate: "Patente: {plate}",
        location: "Dirígete al PISO -2",
        confirm: "Listo",
        successTitle: "✅ Taxi solicitado",
        successHint: "📱 Escanea el QR para continuar en tu teléfono",
        ticketId: "ID: {id}",
        speakSearching: "Estoy buscando taxis disponibles.",
        speakFound: "Taxi encontrado. Llega en aproximadamente {n} minutos.",
        speakReserved: "Taxi solicitado correctamente. Escanea el código QR para continuar."
      },
      en: {
        pageTitle: "Taxi booking",
        pageSubtitle: "Checking availability",
        eta: "Estimated time: {n} minutes",
        plate: "Plate: {plate}",
        location: "Go to FLOOR -2",
        confirm: "Done",
        successTitle: "✅ Taxi requested",
        successHint: "📱 Scan the QR code to continue on your phone",
        ticketId: "ID: {id}",
        speakSearching: "I'm looking for available taxis.",
        speakFound: "Taxi found. It arrives in about {n} minutes.",
        speakReserved: "Taxi requested successfully. Scan the QR code to continue."
      },
      pt: {
        pageTitle: "Reserva de táxi",
        pageSubtitle: "Buscando disponibilidade",
        eta: "Tempo estimado: {n} minutos",
        plate: "Placa: {plate}",
        location: "Dirija-se ao PISO -2",
        confirm: "Pronto",
        successTitle: "✅ Táxi solicitado",
        successHint: "📱 Escaneie o QR para continuar no seu telefone",
        ticketId: "ID: {id}",
        speakSearching: "Estou procurando táxis disponíveis.",
        speakFound: "Táxi encontrado. Chega em aproximadamente {n} minutos.",
        speakReserved: "Táxi solicitado com sucesso. Escaneie o código QR para continuar."
      }
    };

    function t(key, vars) {
      var text = SimaLocale.t(TAXI_I18N, key, taxiLocale);
      if (vars) {
        Object.keys(vars).forEach(function(k) {
          text = text.replace("{" + k + "}", vars[k]);
        });
      }
      return text;
    }

    function applyLocale() {
      taxiLocale = SimaLocale.readLocaleFromPage();
      document.documentElement.lang = taxiLocale;
      document.getElementById("pageTitle").textContent = t("pageTitle");
      document.getElementById("pageSubtitle").textContent = t("pageSubtitle");
      document.getElementById("confirmBtn").textContent = t("confirm");
      document.getElementById("successTitle").textContent = t("successTitle");
      document.getElementById("successHint").textContent = t("successHint");
      document.getElementById("driverName").innerText = lastDriver;
      document.getElementById("etaInfo").innerText = t("eta", { n: lastEta });
      document.getElementById("plateInfo").innerText = t("plate", { plate: lastPlate });
      document.getElementById("locationText").textContent = t("location");
      if (ticketId) {
        document.getElementById("ticketIdText").innerText = t("ticketId", { id: ticketId });
      }
    }

    function handleUnityData(data) {
      simulate();
    }

    window.handleUnityData = handleUnityData;
    SimaLocale.bindPageLocale(applyLocale);

    function setProgress(v) {
      document.getElementById("progressFill").style.width = v + "%";
    }

    function simulate() {
      SimaBridge.speak(t("speakSearching"));

      document.getElementById("driverCard").classList.add("hidden");
      document.getElementById("confirmBtn").classList.add("hidden");

      setProgress(20);

      setTimeout(() => setProgress(50), 600);
      setTimeout(() => setProgress(80), 1200);

      setTimeout(() => {
        setProgress(100);

        const eta = Math.floor(Math.random() * 5) + 3;

        const drivers = ["Camila S.", "Luis P.", "Andrea R.", "Carlos M."];
        const driver = drivers[Math.floor(Math.random() * drivers.length)];

        const plate = randomPlate();

        lastDriver = driver;
        lastEta = eta;
        lastPlate = plate;

        document.getElementById("driverName").innerText = driver;
        document.getElementById("etaInfo").innerText = t("eta", { n: eta });
        document.getElementById("plateInfo").innerText = t("plate", { plate: plate });

        document.getElementById("driverCard").classList.remove("hidden");
        document.getElementById("confirmBtn").classList.remove("hidden");

        SimaBridge.speak(t("speakFound", { n: eta }));
      }, 1800);
    }

    function randomPlate() {
      const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const numbers = "0123456789";

      return (
        letters[Math.floor(Math.random() * 26)] +
        letters[Math.floor(Math.random() * 26)] +
        letters[Math.floor(Math.random() * 26)] +
        letters[Math.floor(Math.random() * 26)] +
        numbers[Math.floor(Math.random() * 10)] +
        numbers[Math.floor(Math.random() * 10)]
      );
    }

  function confirmTaxi() {
  const ticketId = "TAXI-" + Math.floor(1000 + Math.random() * 9000);
const sessionId = "usuario_" + Date.now();
  const link = `https://wa.me/56975416648?text=Reserva%20completada%20con%20éxito.%20Tu%20reserva%20del%20taxi%20es%20Taxi%20ID%20${ticketId}%20soy_${sessionId}`;

  // 🔵 UI: ocultar resultados
  document.getElementById("driverCard").classList.add("hidden");
  document.getElementById("confirmBtn").classList.add("hidden");

  // 🟢 UI: mostrar éxito
  document.getElementById("successPanel").classList.remove("hidden");
  document.getElementById("ticketIdText").innerText = t("ticketId", { id: ticketId });

  // 🔊 voz
  SimaBridge.speak(t("speakReserved"));

  // 📤 enviar a Unity (QR + evento)
  SimaBridge.send("generate_qr", {
    url: link,
    id: ticketId,
  });

  SimaBridge.send("taxi_reserved", {
    eta: "4 minutos",
    reservationId: ticketId,
  });

  // ⏳ cerrar automático
  setTimeout(() => {
    SimaBridge.requestClose();
  }, 2500);
}



    function closeView() {
      SimaBridge.requestClose();
    }

    window.onload = () => {
      applyLocale();
      SimaBridge.ready("taxi");
      // simulate();
    };
  </script>

</body>
</html>
