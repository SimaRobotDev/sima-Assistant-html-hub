<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Emergencia — Cenco Costanera</title>
  <link rel="stylesheet" href="../shared/app.css" />
  <script src="../shared/locale.js"></script>
  <script src="../shared/bridge.js"></script>
  <style>
    :root {
      --em-red: #C62828;
      --em-red-dark: #8E0000;
      --em-surface: #FFF5F5;
      --em-text: #1E1630;
      --em-muted: #6B6280;
      --em-line: #F3D6D6;
      --em-card: #FFFFFF;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--em-surface);
      color: var(--em-text);
    }

    body::before { display: none; }

    .app-shell {
      background: var(--em-surface);
      min-height: 100vh;
      min-height: 100dvh;
      gap: 14px;
      padding: 20px 18px 28px;
    }

    #mainUI {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .em-header {
      background: linear-gradient(135deg, var(--em-red-dark) 0%, var(--em-red) 100%);
      color: #fff;
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 8px 24px rgba(142, 0, 0, 0.22);
    }

    .em-header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }

    .alert-banner {
      background: var(--em-card);
      border: 1px solid var(--em-line);
      border-left: 5px solid var(--em-red);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--em-muted);
      box-shadow: 0 4px 14px rgba(30, 22, 48, 0.06);
    }

    .alert-banner strong {
      color: var(--em-red-dark);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      border: 1px solid var(--em-line);
      border-radius: 14px;
      background: var(--em-card);
      color: var(--em-text);
      font-size: 16px;
      font-weight: 700;
      padding: 16px 18px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 4px 14px rgba(30, 22, 48, 0.06);
    }

    .option-btn:active {
      transform: scale(0.99);
      border-color: rgba(198, 40, 40, 0.45);
    }

    .connecting {
      display: none;
      text-align: center;
      gap: 16px;
      padding: 28px 12px;
      background: var(--em-card);
      border: 1px solid var(--em-line);
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(30, 22, 48, 0.08);
    }

    .connecting.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pulse-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 4px solid var(--em-red);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
      font-size: 36px;
      background: #fff;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
      100% { transform: scale(1); opacity: 1; }
    }

    .connecting h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: var(--em-red-dark);
    }

    .connecting p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--em-muted);
      max-width: 420px;
    }

    .btn-close,
    .btn-back {
      appearance: none;
      border: 1px solid var(--em-line);
      border-radius: 14px;
      background: #fff;
      color: var(--em-red-dark);
      font-size: 15px;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      width: auto;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="mainUI">
      <header class="em-header">
        <h1 id="title">Emergencia</h1>
      </header>

      <div class="alert-banner" id="alertBanner">
        <strong id="alertTitle">Alerta enviada.</strong>
        <span id="alertBody"> Se notificó al equipo con tu piso y ubicación.</span>
      </div>

      <div class="options" id="optionsList"></div>

      <button class="btn-close" id="btnCloseMain" type="button" onclick="SimaBridge.requestClose()">Cerrar</button>
    </div>

    <div class="connecting" id="connectingUI">
      <div class="pulse-ring">✱</div>
      <h2 id="connectingTitle">Comunicándote con seguridad</h2>
      <p id="connectingBody">Estamos conectándote con la seguridad del piso. Mantén la calma.</p>
      <button class="btn-back" id="btnBackConnecting" type="button" onclick="backToOptions()">← Volver</button>
    </div>
  </div>

  <script>
    const OPTIONS = [
      { id: "security", es: "Contactar seguridad", en: "Contact security", pt: "Contatar segurança" },
      { id: "first_aid", es: "Contactar primeros auxilios", en: "Contact first aid", pt: "Contatar primeiros socorros" }
    ];

    const I18N = {
      es: {
        title: "Emergencia",
        alertTitle: "Alerta enviada.",
        alertBody: " Se notificó al equipo con tu piso y ubicación.",
        close: "Cerrar",
        back: "← Volver",
        connectingTitle: "Comunicándote con seguridad",
        speakIntro: "Se envió una alerta. Puedes contactar seguridad o primeros auxilios."
      },
      en: {
        title: "Emergency",
        alertTitle: "Alert sent.",
        alertBody: " The team was notified with your floor and location.",
        close: "Close",
        back: "← Back",
        connectingTitle: "Connecting you with security",
        speakIntro: "An alert was sent. You can contact security or first aid."
      },
      pt: {
        title: "Emergência",
        alertTitle: "Alerta enviada.",
        alertBody: " A equipe foi notificada com seu andar e localização.",
        close: "Fechar",
        back: "← Voltar",
        connectingTitle: "Conectando você à segurança",
        speakIntro: "Um alerta foi enviado. Você pode contatar segurança ou primeiros socorros."
      }
    };

    let locale = "es";
    let floorLabel = "el piso";
    let selected = false;

    function connectingBody() {
      return locale === "en"
        ? "We are connecting you with security on " + floorLabel + ". Stay calm."
        : locale === "pt"
          ? "Estamos conectando você à segurança do " + floorLabel + ". Mantenha a calma."
          : "Estamos conectándote con la seguridad de " + floorLabel + ". Mantén la calma.";
    }

    function optionLabel(opt) {
      return opt[locale] || opt.en || opt.es;
    }

    function applyLocale() {
      locale = SimaLocale.resolveLocale(window.MALL_LOCALE || locale);
      document.documentElement.lang = locale;

      document.getElementById("title").textContent = SimaLocale.t(I18N, "title", locale);
      document.getElementById("alertTitle").textContent = SimaLocale.t(I18N, "alertTitle", locale);
      document.getElementById("alertBody").textContent = SimaLocale.t(I18N, "alertBody", locale);
      document.getElementById("btnCloseMain").textContent = SimaLocale.t(I18N, "close", locale);
      document.getElementById("btnBackConnecting").textContent = SimaLocale.t(I18N, "back", locale);
      document.getElementById("connectingTitle").textContent = SimaLocale.t(I18N, "connectingTitle", locale);
      document.getElementById("connectingBody").textContent = connectingBody();

      const list = document.getElementById("optionsList");
      list.innerHTML = "";
      OPTIONS.forEach((opt) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-btn";
        const label = optionLabel(opt);
        btn.textContent = label;
        btn.onclick = () => selectOption(opt.id, label);
        list.appendChild(btn);
      });
    }

    function backToOptions() {
      selected = false;
      document.getElementById("connectingUI").classList.remove("active");
      document.getElementById("mainUI").style.display = "";
    }

    function selectOption(optionId, optionLabel) {
      if (selected) return;
      selected = true;

      document.getElementById("mainUI").style.display = "none";
      document.getElementById("connectingUI").classList.add("active");

      SimaBridge.send("emergency_option", {
        optionId: optionId,
        optionLabel: optionLabel,
        sessionId: window.EMERGENCY_SESSION_ID || ""
      });
      SimaBridge.speak(connectingBody());
      SimaBridge.animate("serious");
    }

    window.handleUnityData = function(data) {
      if (!data) return;
      if (typeof data === "string") {
        try { data = JSON.parse(data); } catch (e) { return; }
      }

      if (data.floor) floorLabel = data.floor;
      if (data.sessionId) window.EMERGENCY_SESSION_ID = data.sessionId;

      applyLocale();
    };

    SimaLocale.bindPageLocale(applyLocale);

    window.addEventListener("load", function() {
      applyLocale();
      SimaBridge.ready("emergency");
      SimaBridge.speak(SimaLocale.t(I18N, "speakIntro", locale));
    });
  </script>
</body>
</html>
