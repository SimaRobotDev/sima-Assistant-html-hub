<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Reservar salas de reuniones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="stylesheet" href="../shared/app.css" />
  <script src="../shared/qrcode.min.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="../shared/fragment.js"></script>
</head>
<body>
  <div class="fragment-shell">
    <div class="fragment-header">
      <h1 class="fragment-title">Salas de reuniones</h1>
      <p class="fragment-subtitle">
        Elige una sala o escanea el QR con tu teléfono.
      </p>
    </div>

    <div class="fragment-body">
      <div class="room-grid">
        <div class="room-card">
          <h3>Sala 3</h3>
          <p>Reserva aquí o con tu celular</p>
          <button class="btn-room" id="btnRoom3">Reservar Sala 3</button>
          <div class="qr-box" id="qrRoom3"></div>
          <span class="qr-hint">Escanea para reservar</span>
        </div>

        <div class="room-card">
          <h3>Sala 4</h3>
          <p>Reserva aquí o con tu celular</p>
          <button class="btn-room" id="btnRoom4">Reservar Sala 4</button>
          <div class="qr-box" id="qrRoom4"></div>
          <span class="qr-hint">Escanea para reservar</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    var ROOM_3_URL = "https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ1JnuoZvitonvg2CqTInt_FvG3V6pMaIrD7L9TCnQBOtdRSS7powS1C_ph-JAL4TVEHs_DkwUsP";
    var ROOM_4_URL = "https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ2zPc8rbSGhvkPVGTW34uGiBZo7ZkciXPD-jSoSj9Aivhpf76zyIIQf19TIA5FpvBQwKZNxxHZF";

    var MSG_WELCOME = "Tenemos dos salas de reuniones disponibles. Elige la sala 3 o la sala 4, o escanea el código QR con tu teléfono.";
    var MSG_ROOM_3 = "Perfecto, te muestro el calendario para reservar la sala 3.";
    var MSG_ROOM_4 = "Te abro la reserva de la sala 4.";

    function reserveRoom(url, message) {
      SimaBridge.loadUrl(url, message);
    }

    document.getElementById("btnRoom3").addEventListener("click", function() {
      reserveRoom(ROOM_3_URL, MSG_ROOM_3);
    });

    document.getElementById("btnRoom4").addEventListener("click", function() {
      reserveRoom(ROOM_4_URL, MSG_ROOM_4);
    });

    document.addEventListener("DOMContentLoaded", function() {
      SimaFragment.renderQr("qrRoom3", ROOM_3_URL, 96);
      SimaFragment.renderQr("qrRoom4", ROOM_4_URL, 96);
      SimaFragment.initFragmentPage({
        screenName: "meetings",
        welcomeText: MSG_WELCOME
      });
    });
  </script>
</body>
</html>
