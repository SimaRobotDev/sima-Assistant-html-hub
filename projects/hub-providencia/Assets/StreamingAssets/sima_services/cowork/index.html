<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro CoWork</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="stylesheet" href="../shared/app.css" />
  <script src="../shared/qrcode.min.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="../shared/fragment.js"></script>
</head>
<body>
  <div class="fragment-shell">
    <div class="fragment-header">
      <h1 class="fragment-title">Registro CoWork</h1>
      <p class="fragment-subtitle">
        Escanea el código QR con tu celular y completa el formulario para usar el espacio.
      </p>
    </div>

    <div class="fragment-body">
      <div class="cowork-qr-wrap">
        <div class="qr-box" id="qrCowork"></div>
        <span class="qr-hint">Apunta la cámara de tu teléfono al código QR</span>

        <div class="cowork-steps">
          <div class="cowork-step">
            <span class="cowork-step-num">1</span>
            <span>Escanea el QR con la cámara de tu celular</span>
          </div>
          <div class="cowork-step">
            <span class="cowork-step-num">2</span>
            <span>Completa el formulario de registro en Google Forms</span>
          </div>
          <div class="cowork-step">
            <span class="cowork-step-num">3</span>
            <span>¡Listo! Ya puedes usar el espacio CoWork</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var COWORK_FORM_URL = "https://www.docs.google.com/forms/d/e/1FAIpQLScYOFbVWzWaKMKlZH0qqa8zXCoDnOhpvQ0c2TU4Rde_2BRYpg/viewform";
    var MSG_WELCOME = "Para registrarte en el cowork, escanea el código QR con tu celular y completa el formulario de registro.";

    document.addEventListener("DOMContentLoaded", function() {
      SimaFragment.renderQr("qrCowork", COWORK_FORM_URL, 150);
      SimaFragment.initFragmentPage({
        screenName: "cowork",
        welcomeText: MSG_WELCOME
      });
    });
  </script>
</body>
</html>
